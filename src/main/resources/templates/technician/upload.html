<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Technician Upload - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Technician Console', 'Kỹ thuật viên', 'ms-avatar-accent')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3" th:replace="~{common/fragments/app-sidebar :: sidebar('technician', 'Technician Console', 'Kỹ thuật viên', 'ms-avatar-accent', 'upload-form')}"></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4"><div><span class="ms-pill ms-pill-warning mb-3">Technician workflow</span><h1 class="ms-display display-6 mb-2">Upload ảnh và tạo hồ sơ</h1></div></section>
                <section class="ms-card-solid rounded-5 p-4 p-lg-5">
                    <form th:action="@{/technician/xray-upload}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3"><label class="ms-label" for="appointmentId">Chọn lịch chụp</label><select id="appointmentId" name="appointmentId" class="form-select ms-input"><option value="">Không gắn lịch</option><option th:each="appointment : ${scheduledAppointments}" th:value="${appointment.appointmentId}" th:text="${appointment.appointmentCode + ' - ' + appointment.patient.fullName + ' - ' + #temporals.format(appointment.scheduledTime, 'dd/MM/yyyy HH:mm')}">APT</option></select></div>
                        <div class="row g-3"><div class="col-md-6"><label class="ms-label" for="uploadPatientEmail">Email bệnh nhân</label><input id="uploadPatientEmail" name="patientEmail" type="email" class="form-control ms-input"></div><div class="col-md-6"><label class="ms-label" for="uploadDoctorEmail">Email bác sĩ</label><input id="uploadDoctorEmail" name="doctorEmail" type="email" class="form-control ms-input"></div></div>
                        <div class="mb-3 mt-3"><label class="ms-label" for="symptomDescription">Mô tả triệu chứng</label><textarea id="symptomDescription" name="symptomDescription" class="form-control ms-input" rows="2"></textarea></div>
                        <div class="row g-3"><div class="col-md-6"><label class="ms-label" for="uploadBodyPart">Vùng chụp</label><input id="uploadBodyPart" name="bodyPart" class="form-control ms-input"></div><div class="col-md-6"><label class="ms-label" for="viewPosition">Tư thế chụp</label><input id="viewPosition" name="viewPosition" class="form-control ms-input"></div></div>
                        <div class="mb-4 mt-3"><label class="ms-label" for="originalImagePath">Đường dẫn ảnh X-Ray</label><input id="originalImagePath" name="originalImagePath" class="form-control ms-input" required></div>
                        <button type="submit" class="btn ms-btn ms-btn-primary text-white w-100">Tạo hồ sơ và lưu ảnh</button>
                    </form>
                </section>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
