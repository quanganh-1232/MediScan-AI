<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Technician Recent - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Technician Console', 'Kỹ thuật viên', 'ms-avatar-accent')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('technician', 'Technician Console', 'Kỹ thuật viên', 'ms-avatar-accent', 'recent-items')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4"><div><span class="ms-pill ms-pill-warning mb-3">Recent items</span><h1 class="ms-display display-6 mb-2">Dữ liệu gần đây</h1></div></section>
                <div class="row g-4">
                    <div class="col-xl-6"><section class="ms-card-solid rounded-5 p-4 p-lg-5 h-100"><h2 class="ms-section-title h4 mb-4">Lịch chụp gần đây</h2><div class="table-responsive"><table class="ms-table"><thead><tr><th>Mã lịch</th><th>Bệnh nhân</th><th>Thời gian</th><th>Vùng chụp</th></tr></thead><tbody><tr th:each="appointment : ${recentAppointments}"><td class="fw-bold" th:text="${appointment.appointmentCode}">APT</td><td th:text="${appointment.patient.fullName}">Patient</td><td th:text="${#temporals.format(appointment.scheduledTime, 'dd/MM/yyyy HH:mm')}">time</td><td th:text="${appointment.bodyPart}">Body part</td></tr><tr th:if="${#lists.isEmpty(recentAppointments)}"><td colspan="4" class="text-center text-muted py-4">Chưa có lịch chụp.</td></tr></tbody></table></div></section></div>
                    <div class="col-xl-6"><section class="ms-card-solid rounded-5 p-4 p-lg-5 h-100"><h2 class="ms-section-title h4 mb-4">Ảnh đã upload</h2><div class="d-grid gap-3"><div class="ms-activity-item" th:each="image : ${recentImages}"><div class="d-flex justify-content-between gap-3"><div><div class="fw-bold" th:text="${image.record.recordCode + ' - ' + image.bodyPart}">MR</div><div class="small text-muted" th:text="${image.originalImagePath}">path</div></div></div></div><div th:if="${#lists.isEmpty(recentImages)}" class="text-muted">Chưa có ảnh X-Ray nào.</div></div></section></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
