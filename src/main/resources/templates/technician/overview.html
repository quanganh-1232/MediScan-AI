<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Technician Overview - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Technician Console', 'Kỹ thuật viên', 'ms-avatar-accent')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('technician', 'Technician Console', 'Kỹ thuật viên', 'ms-avatar-accent', 'overview')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4">
                    <div>
                        <span class="ms-pill ms-pill-warning mb-3">Technician overview</span>
                        <h1 class="ms-display display-6 mb-2">Tổng quan ca làm việc</h1>
                        <p class="ms-subtle mb-0">Từ đây bạn đi sang form đặt lịch, upload ảnh hoặc xem dữ liệu gần đây bằng route riêng.</p>
                    </div>
                    <div class="ms-readonly-note"><div class="fw-bold" th:text="${scheduledCount}">0</div><div class="small text-muted">Lịch chờ xử lý</div></div>
                </section>
                <div class="row g-3 g-lg-4">
                    <div class="col-6 col-xl-3"><div class="ms-metric h-100"><div class="ms-metric-label">Cuộc hẹn</div><div class="ms-metric-number" th:text="${scheduledCount}">0</div></div></div>
                    <div class="col-6 col-xl-3"><div class="ms-metric h-100"><div class="ms-metric-label">Hồ sơ bệnh án</div><div class="ms-metric-number" th:text="${uploadedRecordCount}">0</div></div></div>
                    <div class="col-6 col-xl-3"><div class="ms-metric h-100"><div class="ms-metric-label">Ảnh X-Quang</div><div class="ms-metric-number" th:text="${uploadedImageCount}">0</div></div></div>
                    <div class="col-6 col-xl-3"><div class="ms-metric h-100"><div class="ms-metric-label">AI / Bác sĩ</div><div class="ms-metric-number" th:text="${aiSuccessCount + '/' + approvedReviewCount}">0/0</div></div></div>
                </div>

                <div class="card-body p-0">
                <table class="table ms-table ms-table-striped ms-table-hover">
                <thead>
                    <tr>
                        <th>Bệnh nhân</th>
                        <th>Thời gian</th>
                        <th>Bác sĩ</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(scheduledAppointments)}">
                    <td colspan="5" class="text-center py-5 text-muted">
                        <i class="bi bi-calendar-x fs-2 d-block mb-2"></i>
                        Không có bệnh nhân nào đang chờ.
                    </td>
                </tr>

                <tr th:each="appointment : ${scheduledAppointments}">
                    <td th:text="${appointment.patient.fullName}"></td>
                    <td th:text="${appointment.appointmentTime}"></td>
                    <td th:text="${appointment.doctor.fullName}"></td>

                    <td>
                        <span class="badge bg-warning"
                        th:text="${appointment.status}">
                        </span>
                    </td>

                    <td>
                        <a class="btn btn-primary btn-sm"
                           th:href="@{/technician/xray-upload(appointmentId=${appointment.id})}">
                            Scan
                        </a>
                    </td>
                </tr>
                </tbody>
                </table>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
