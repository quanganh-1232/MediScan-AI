<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Technician Appointments - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Technician Console', 'Kỹ thuật viên', 'ms-avatar-accent')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3" th:replace="~{common/fragments/app-sidebar :: sidebar('technician', 'Technician Console', 'Kỹ thuật viên', 'ms-avatar-accent', 'appointment-form')}"></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4"><div><span class="ms-pill ms-pill-warning mb-3">Technician workflow</span><h1 class="ms-display display-6 mb-2">Tạo lịch chụp</h1></div></section>
                <section class="ms-card-solid rounded-5 p-4 p-lg-5">
                    <form th:action="@{/technician/appointments}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3"><label class="ms-label" for="appointmentPatientEmail">Email bệnh nhân</label><input id="appointmentPatientEmail" name="patientEmail" type="email" class="form-control ms-input" required></div>
                        <div class="mb-3"><label class="ms-label" for="appointmentDoctorEmail">Email bác sĩ phụ trách</label><input id="appointmentDoctorEmail" name="doctorEmail" type="email" class="form-control ms-input"></div>
                        <div class="row g-3"><div class="col-md-6"><label class="ms-label" for="scheduledTime">Thời gian chụp</label><input id="scheduledTime" name="scheduledTime" type="datetime-local" class="form-control ms-input" required></div><div class="col-md-6"><label class="ms-label" for="appointmentBodyPart">Vùng chụp</label><input id="appointmentBodyPart" name="bodyPart" class="form-control ms-input" required></div></div>
                        <div class="mb-3 mt-3"><label class="ms-label" for="location">Phòng chụp</label><input id="location" name="location" class="form-control ms-input"></div>
                        <div class="mb-4"><label class="ms-label" for="note">Ghi chú</label><textarea id="note" name="note" class="form-control ms-input" rows="3"></textarea></div>
                        <button type="submit" class="btn ms-btn ms-btn-primary text-white w-100">Lưu lịch chụp</button>
                    </form>
                </section>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
