<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{common/fragments/top-nav :: nav}"></div>

<main class="container py-4">
    <section class="pt-card p-4 p-lg-5 mx-auto" style="max-width: 40rem;">
        <div class="mb-4">
            <a th:href="@{/profile}" class="small fw-semibold text-decoration-none"><i class="bi bi-chevron-left"></i> Quay lại hồ sơ</a>
            <h1 class="fw-bold fs-3 mt-2 mb-1"><i class="bi bi-key text-primary me-2"></i>Đổi mật khẩu</h1>
            <p class="text-secondary mb-0">Chỉ áp dụng cho tài khoản đăng ký bằng email/mật khẩu.</p>
        </div>

        <div th:if="${error}" class="alert alert-danger ms-auth-alert"><i class="bi bi-x-circle-fill"></i><span th:text="${error}"></span></div>
        <div th:if="${success}" class="alert alert-success ms-auth-alert"><i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span></div>

        <form th:action="@{/change-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="mb-3">
                <label for="currentPassword" class="ms-label">Mật khẩu hiện tại</label>
                <div class="ms-input-group">
                    <span class="ms-input-icon"><i class="bi bi-lock"></i></span>
                    <input id="currentPassword" name="currentPassword" type="password" class="form-control ms-input" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="newPassword" class="ms-label">Mật khẩu mới</label>
                <div class="ms-input-group">
                    <span class="ms-input-icon"><i class="bi bi-lock-fill"></i></span>
                    <input id="newPassword" name="newPassword" type="password" class="form-control ms-input" required minlength="6">
                </div>
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="ms-label">Xác nhận mật khẩu mới</label>
                <div class="ms-input-group">
                    <span class="ms-input-icon"><i class="bi bi-lock-fill"></i></span>
                    <input id="confirmPassword" name="confirmPassword" type="password" class="form-control ms-input" required minlength="6">
                </div>
            </div>
            <button class="btn ms-btn ms-btn-primary text-white w-100" type="submit"><i class="bi bi-check-lg me-1"></i>Cập nhật mật khẩu</button>
        </form>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
