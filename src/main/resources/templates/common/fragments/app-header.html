<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<header class="ms-app-header" th:fragment="header(portalName, roleLabel, roleClass)">
    <div class="container-fluid px-3 px-lg-4">
        <div class="ms-topbar d-flex justify-content-between align-items-center">
            <div class="ms-header-copy">
                <div class="small text-uppercase text-muted fw-semibold">MediScan AI</div>
                <div class="fw-bold" th:text="${portalName}">Portal</div>
            </div>

            <div class="d-flex align-items-center gap-3">

                <a th:href="@{/notifications}" class="d-flex align-items-center justify-content-center position-relative"
                   style="width: 32px; height: 32px; color: #000000; text-decoration: none; transition: transform 0.2s ease, opacity 0.2s ease;"
                   onmouseover="this.style.opacity='0.6'; this.style.transform='scale(1.05)';"
                   onmouseout="this.style.opacity='1'; this.style.transform='scale(1)';"
                   title="Thông báo cá nhân">

                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" class="bi bi-bell" viewBox="0 0 16 16" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zM8 1.918l-.079-.002A3.5 3.5 0 0 0 4.5 5.378V9c0 1.636-.576 3.018-1.5 4h10c-.924-.982-1.5-2.364-1.5-4V5.378a3.5 3.5 0 0 0-3.421-3.46l-.079.002z"/>
                    </svg>

                    <span th:if="${unreadCount != null && unreadCount > 0}"
                          class="position-absolute rounded-circle bg-danger"
                          style="width: 8px; height: 8px; top: 2px; right: 2px; z-index: 3;"
                          title="Có thông báo mới"></span>
                </a>

                <div class="vr bg-secondary opacity-25" style="height: 24px;"></div>

                <div class="dropdown ms-account-dropdown">
                    <button class="btn ms-account-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span th:class="'ms-avatar ' + ${roleClass}" th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
                        <span class="d-none d-md-block text-start">
                            <span class="d-block fw-bold" sec:authentication="name">user@mediscan.ai</span>
                            <span class="d-block small text-muted" th:text="${roleLabel}">Role</span>
                        </span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end ms-dropdown-panel">
                        <div class="px-3 py-3 border-bottom">
                            <div class="small text-muted">Đang đăng nhập</div>
                            <div class="fw-semibold" sec:authentication="name">user@mediscan.ai</div>
                            <div class="small text-muted" th:text="${roleLabel}">Role</div>
                        </div>
                        <a class="dropdown-item py-2" th:href="@{/home}">Tổng quan</a>
                        <a class="dropdown-item py-2" th:href="@{/profile}">Hồ sơ cá nhân</a>
                        <a class="dropdown-item py-2" th:href="@{/profile/edit}">Chỉnh sửa thông tin</a>
                        <a class="dropdown-item py-2" th:href="@{/notifications}">Thông báo</a>
                        <a class="dropdown-item py-2" th:href="@{/change-password}">Đổi mật khẩu</a>
                        <form th:action="@{/logout}" method="post" class="px-3 pt-2 pb-3">
                            <button type="submit" class="btn ms-btn ms-btn-primary text-white w-100">Đăng xuất</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</header>
</body>
</html>
