<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <header class="ms-app-header" th:fragment="header(portalName, roleLabel, roleClass)">
        <div class="container-fluid px-3 px-lg-4">
            <div class="ms-topbar">
                <a th:href="@{/home}" class="ms-brand text-decoration-none text-dark">
                    <div class="ms-brand-mark ms-brand-mark-solid">M</div>
                    <div>
                        <div class="fw-bold">MediScan AI</div>
                        <div class="small text-muted" th:text="${portalName}">Portal</div>
                    </div>
                </a>

                <div class="ms-header-actions">
                    <div class="dropdown">
                        <button class="btn ms-icon-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false"
                            aria-label="Thông báo">
                            <span class="ms-bell-mark">!</span>
                            <span class="ms-notification-count" id="header-unread-count"
                                th:if="${headerUnreadCount != null && headerUnreadCount > 0}"
                                th:text="${headerUnreadCount}">0</span>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end ms-dropdown-panel ms-notification-panel">
                            <div class="px-3 py-3 border-bottom">
                                <div class="d-flex justify-content-between align-items-center gap-3">
                                    <div>
                                        <div class="fw-bold">Thông báo</div>
                                        <div class="small text-muted">Cập nhật mới nhất theo thời gian</div>
                                    </div>
                                    <span class="ms-badge ms-badge-warning" id="header-unread-badge"
                                        th:if="${headerUnreadCount != null && headerUnreadCount > 0}"
                                        th:text="${headerUnreadCount + ' mới'}">0 mới</span>
                                </div>
                            </div>
                            <div class="p-2" id="header-notification-list">
                                <div th:if="${headerNotifications == null or #lists.isEmpty(headerNotifications)}"
                                    class="text-center text-muted small py-4">Chưa có thông báo.</div>
                                <a th:each="n : ${headerNotifications}" th:href="@{/notifications}"
                                    class="ms-notification-item text-decoration-none text-dark d-block">
                                    <div class="d-flex justify-content-between gap-3">
                                        <div class="min-w-0">
                                            <div class="fw-semibold text-truncate" th:text="${n.title}">Tiêu đề</div>
                                            <div class="small text-muted ms-notification-message" th:text="${n.message}">
                                                Nội dung</div>
                                            <div class="small text-muted mt-1"
                                                th:text="${n.createdAt != null ? #temporals.format(n.createdAt, 'HH:mm dd/MM/yyyy') : 'Vừa cập nhật'}">
                                                08:30 12/06/2026</div>
                                        </div>
                                        <span class="ms-unread-dot" th:if="${!n.read}"></span>
                                    </div>
                                </a>
                            </div>
                            <div class="px-3 pb-3">
                                <a th:href="@{/notifications}" class="btn ms-btn ms-btn-primary text-white w-100">Xem tất cả</a>
                            </div>
                        </div>
                    </div>

                    <div class="dropdown ms-account-dropdown">
                        <button class="btn ms-account-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <span th:class="'ms-avatar ' + ${roleClass}"
                                th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
                            <span class="d-none d-md-block text-start">
                                <span class="d-block fw-bold" sec:authentication="name">user@mediscan.ai</span>
                                <span class="d-block small text-muted" th:text="${roleLabel}">Role</span>
                            </span>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end ms-dropdown-panel">

                            <a class="dropdown-item py-2" th:href="@{/profile}">Hồ sơ cá nhân</a>
                            <a class="dropdown-item py-2" th:href="@{/profile/edit}">Chỉnh sửa thông tin</a>
                            <a class="dropdown-item py-2" th:href="@{/notifications}">Thông báo</a>
                            <a class="dropdown-item py-2" th:href="@{/change-password}">Đổi mật khẩu</a>
                            <form th:action="@{/logout}" method="post" class="px-3 pt-2 pb-3">
                                <button type="submit" class="btn ms-btn ms-btn-primary text-white w-100">Đăng xuất</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function pollNotifications() {
                fetch('/api/notifications/recent')
                    .then(response => {
                        if (!response.ok) throw new Error('Network response was not ok');
                        return response.json();
                    })
                    .then(data => {
                        // Update unread count
                        const countEl = document.getElementById('header-unread-count');
                        const badgeEl = document.getElementById('header-unread-badge');
                        
                        if (data.unreadCount > 0) {
                            if (countEl) countEl.textContent = data.unreadCount;
                            else {
                                const btn = document.querySelector('button[aria-label="Thông báo"]');
                                const span = document.createElement('span');
                                span.className = 'ms-notification-count';
                                span.id = 'header-unread-count';
                                span.textContent = data.unreadCount;
                                btn.appendChild(span);
                            }
                            if (badgeEl) badgeEl.textContent = data.unreadCount + ' mới';
                            else {
                                // Add badge if it was missing
                            }
                        } else {
                            if (countEl) countEl.remove();
                            if (badgeEl) badgeEl.remove();
                        }

                        // Update list
                        const listEl = document.getElementById('header-notification-list');
                        if (listEl && data.notifications) {
                            if (data.notifications.length === 0) {
                                listEl.innerHTML = '<div class="text-center text-muted small py-4">Chưa có thông báo.</div>';
                            } else {
                                let html = '';
                                data.notifications.forEach(n => {
                                    const date = new Date(n.createdAt);
                                    const dateStr = date.toLocaleString('vi-VN', {hour: '2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', year:'numeric'});
                                    html += `
                                        <a href="/notifications" class="ms-notification-item text-decoration-none text-dark d-block">
                                            <div class="d-flex justify-content-between gap-3">
                                                <div class="min-w-0">
                                                    <div class="fw-semibold text-truncate">${n.title}</div>
                                                    <div class="small text-muted ms-notification-message">${n.message}</div>
                                                    <div class="small text-muted mt-1">${dateStr}</div>
                                                </div>
                                                ${!n.read ? '<span class="ms-unread-dot"></span>' : ''}
                                            </div>
                                        </a>
                                    `;
                                });
                                listEl.innerHTML = html;
                            }
                        }
                    })
                    .catch(err => console.error('Error polling notifications', err));
            }

            // Poll every 30 seconds
            setInterval(pollNotifications, 30000);
        });
    </script>
</body>

</html>
