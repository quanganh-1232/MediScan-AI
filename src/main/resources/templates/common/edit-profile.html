<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa thông tin - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }</style>
</head>
<body>
<div class="ms-shell">
    <main class="ms-container container py-4 py-lg-5">
        <section class="ms-card-solid rounded-5 p-4 p-lg-5 mx-auto" style="max-width: 46rem;">
            <div class="mb-4">
                <a th:href="@{/profile}" class="text-decoration-none fw-semibold">&lt; Quay lại hồ sơ</a>
                <h1 class="ms-section-title h2 mt-3 mb-2">Chỉnh sửa thông tin</h1>
                <p class="ms-subtle mb-0">Cập nhật họ tên, email và số điện thoại trong bảng users.</p>
            </div>
            <div th:if="${error}" class="alert alert-danger rounded-4 border-0" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success rounded-4 border-0" th:text="${success}"></div>
            <form th:action="@{/profile/edit}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="mb-3">
                    <label for="fullName" class="ms-label">Họ và tên</label>
                    <input id="fullName" name="fullName" class="form-control ms-input" th:value="${user.fullName}" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="ms-label">Email</label>
                    <input id="email" name="email" type="email" class="form-control ms-input" th:value="${user.email}" required>
                </div>
                <div class="mb-4">
                    <label for="phone" class="ms-label">Số điện thoại</label>
                    <input id="phone" name="phone" class="form-control ms-input" th:value="${user.phone}">
                </div>
                <button class="btn ms-btn ms-btn-primary text-white w-100" type="submit">Lưu thay đổi</button>
            </form>
        </section>
    </main>
</div>
</body>
</html>
