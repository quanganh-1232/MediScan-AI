<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa thông tin - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{common/fragments/top-nav :: nav}"></div>

<main class="container py-4">
    <section class="pt-card p-4 p-lg-5 mx-auto" style="max-width: 44rem;">
        <div class="mb-4">
            <a th:href="@{/profile}" class="small fw-semibold text-decoration-none"><i class="bi bi-chevron-left"></i> Quay lại hồ sơ</a>
            <h1 class="fw-bold fs-3 mt-2 mb-1"><i class="bi bi-pencil-square text-primary me-2"></i>Chỉnh sửa thông tin</h1>
            <p class="text-secondary mb-0">Cập nhật thông tin liên hệ dùng trong hồ sơ MediScan AI.</p>
        </div>

        <div th:if="${error}" class="alert alert-danger ms-auth-alert"><i class="bi bi-x-circle-fill"></i><span th:text="${error}"></span></div>
        <div th:if="${success}" class="alert alert-success ms-auth-alert"><i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span></div>

        <form th:action="@{/profile/edit}" th:object="${profileUpdateDTO}" method="post">
            <div class="mb-3">
                <label for="fullName" class="ms-label">Họ và tên</label>
                <div class="ms-input-group">
                    <span class="ms-input-icon"><i class="bi bi-person"></i></span>
                    <input id="fullName" class="form-control ms-input" th:field="*{fullName}"
                           th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
                </div>
                <span class="invalid-feedback d-block" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
            </div>
            <div class="mb-3">
                <label for="email" class="ms-label">Email</label>
                <div class="ms-input-group">
                    <span class="ms-input-icon"><i class="bi bi-envelope"></i></span>
                    <input id="email" type="email" class="form-control ms-input" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                </div>
                <span class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="mb-4">
                <label for="phone" class="ms-label">Số điện thoại</label>
                <div class="ms-input-group">
                    <span class="ms-input-icon"><i class="bi bi-telephone"></i></span>
                    <input id="phone" class="form-control ms-input" th:field="*{phone}"
                           th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid' : ''">
                </div>
                <span class="invalid-feedback d-block" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
            </div>
            <button class="btn ms-btn ms-btn-primary text-white w-100" type="submit"><i class="bi bi-check-lg me-1"></i>Lưu thay đổi</button>
        </form>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
