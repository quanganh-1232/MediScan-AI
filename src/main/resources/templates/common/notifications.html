<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông báo - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{common/fragments/top-nav :: nav}"></div>

<main class="container py-4">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
            <h1 class="fw-bold mb-1 fs-3"><i class="bi bi-bell text-primary me-2"></i>Thông báo</h1>
            <p class="text-secondary mb-0">Các cập nhật về hồ sơ, lịch hẹn và kết quả chẩn đoán, mới nhất xếp trước.</p>
        </div>
        <div class="pt-stat" style="height:auto;">
            <span class="pt-stat-icon warn"><i class="bi bi-envelope-exclamation"></i></span>
            <span>
                <span class="pt-stat-number" th:text="${unreadCount}">0</span>
                <span class="pt-stat-label d-block">chưa đọc</span>
            </span>
        </div>
    </div>

    <section class="pt-card p-3 p-lg-4">
        <div th:if="${#lists.isEmpty(notifications)}" class="text-center text-muted py-5">
            <div class="small">Chưa có thông báo nào.</div>
        </div>
        <div class="d-grid gap-2" th:if="${!#lists.isEmpty(notifications)}">
            <a th:each="n : ${notifications}"
               th:href="@{/notifications/click(id=${n.notificationId})}"
               class="ms-notif-item rounded-3 shadow-sm"
               th:classappend="${!n.read} ? ' unread' : ''">
                <div class="d-flex align-items-center justify-content-between mb-1.5">
                    <div class="fw-bold text-dark fs-6" th:text="${n.title}">Tiêu đề thông báo</div>
                    <span th:if="${!n.read}" class="badge bg-teal text-white flex-shrink-0 px-2.5 py-1">Chưa đọc</span>
                    <span th:if="${n.read}" class="badge bg-light text-muted border flex-shrink-0 px-2.5 py-1">Đã đọc</span>
                </div>
                <div class="text-secondary mb-2" style="font-size: 0.9rem; line-height: 1.5;" th:text="${n.message}">Nội dung thông báo</div>
                <div class="text-muted small">
                    <span th:text="${n.createdAt != null ? #temporals.format(n.createdAt, 'HH:mm • dd/MM/yyyy') : 'Vừa cập nhật'}">08:30 • 20/07/2026</span>
                </div>
            </a>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
