<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef7f6;
        }

        .auth-card {
            max-width: 430px;
            border-radius: 16px;
            border: none;
        }

        .brand {
            color: #0d9488;
            font-weight: 700;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 d-flex justify-content-center">
            <div class="card auth-card shadow p-4 w-100">
                <div class="text-center mb-4">
                    <h3 class="brand">MediScan AI</h3>
                    <p class="text-muted small mb-0">Đăng nhập hệ thống chẩn đoán hình ảnh</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger">
                    Email hoặc mật khẩu không đúng.
                </div>

                <div th:unless="${param.error}">
                    <div th:if="${param.success}" class="alert alert-success">
                        Đăng ký thành công. Vui lòng đăng nhập.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-info">
                        Bạn đã đăng xuất.
                    </div>
                </div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email"
                               id="email"
                               name="email"
                               class="form-control"
                               placeholder="Nhập email"
                               required
                               autofocus>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Nhập mật khẩu"
                               required>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">
                            Đăng nhập
                        </button>
                    </div>
                </form>

                <div class="text-center small">
                    <a th:href="@{/register}">Chưa có tài khoản? Đăng ký</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
