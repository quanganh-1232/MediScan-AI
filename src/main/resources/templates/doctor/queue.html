<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doctor Queue - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Diagnosis Center', 'Bác sĩ', 'ms-avatar-purple')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('doctor', 'Diagnosis Center', 'Bác sĩ', 'ms-avatar-purple', 'queue')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4">
                    <div>
                        <span class="ms-pill ms-pill-soft mb-3">Doctor queue</span>
                        <h1 class="ms-display display-6 mb-2">Hàng đợi đọc kết quả</h1>
                    </div>
                    <div class="ms-readonly-note"><div class="fw-bold" th:text="${queueCount}">0</div><div class="small text-muted">Ca đang chờ xử lý</div></div>
                </section>
                <section class="ms-card-solid rounded-5 p-4 p-lg-5">
                    <div class="table-responsive">
                        <table class="ms-table">
                            <thead><tr><th>Mã hồ sơ</th><th>Bệnh nhân</th><th>Vùng chụp</th><th>Dự đoán AI</th><th>Tin cậy</th><th>Thao tác</th></tr></thead>
                            <tbody>
                            <tr th:each="record : ${queueRecords}">
                                <td>
                                    <div class="fw-bold" th:text="${record.recordCode}">XR</div>
                                    <div class="small text-muted" th:text="${#temporals.format(record.createdAt, 'dd/MM/yyyy HH:mm:ss')}">date</div>
                                </td>
                                <td th:text="${record.patient.fullName}">Patient</td>
                                <td th:text="${record.bodyPart}">Body part</td>
                                <td th:text="${record.aiPrediction}">Chờ AI phân tích</td>
                                <td>
                                    <div class="ms-progress-bar"><div class="ms-progress-fill" th:style="${'width:' + (record.aiConfidence != null ? record.aiConfidence : 0) + '%'}"></div></div>
                                    <div class="small text-muted mt-1" th:text="${(record.aiConfidence != null ? record.aiConfidence : 0) + '%'}">0%</div>
                                </td>
                                <td style="min-width: 320px;">
                                    <a th:href="@{/doctor/record/{id}(id=${record.recordId})}" class="btn ms-btn ms-btn-secondary text-dark w-100 mb-3">Chi tiết</a>
                                    <img th:if="${record.fileName != null}" th:src="@{'/uploads/' + ${record.fileName}}" class="img-fluid rounded border mb-2" alt="X-Ray" style="max-height: 180px;">
                                    <form th:action="@{/doctor/records/confirm}" method="post" class="d-grid gap-2">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <input type="hidden" name="recordId" th:value="${record.recordId}">
                                        <textarea name="conclusion" class="form-control ms-input" rows="2" th:placeholder="${record.aiPrediction}"></textarea>
                                        <textarea name="recommendation" class="form-control ms-input" rows="2" th:placeholder="${record.recommendation != null ? record.recommendation : 'Khuyến nghị điều trị / chụp bổ sung'}"></textarea>
                                        <div class="d-flex gap-2">
                                            <button type="submit" class="btn ms-btn ms-btn-primary text-white flex-fill">Xác nhận</button>
                                            <button type="submit" th:formaction="@{/doctor/records/reject}" class="btn ms-btn ms-btn-ghost border-secondary bg-white flex-fill">Yêu cầu xem lại</button>
                                        </div>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(queueRecords)}"><td colspan="6" class="text-center text-muted py-4">Chưa có ca nào trong hàng đợi.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
