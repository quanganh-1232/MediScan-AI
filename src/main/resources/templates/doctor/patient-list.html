<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách bệnh nhân - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    </style>
</head>
<body>

<!-- Sử dụng layout cũ -->
<div th:replace="~{doctor/fragments/doctor-shell :: nav}"></div>

<main class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">
        
        <!-- Sidebar cũ -->
        <div class="col-12 col-xl-2">
            <div th:replace="~{doctor/fragments/doctor-shell :: sidebar('patients')}"></div>
        </div>

        <!-- Main Content -->
        <div class="col-12 col-xl-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="fw-bold fs-3 mb-1">
                        <i class="bi bi-journal-medical text-primary me-2"></i>
                        Danh sách bệnh nhân
                    </h1>
                    <p class="text-secondary mb-0">Quản lý toàn bộ bệnh nhân trên hệ thống MediScan AI.</p>
                </div>
                <div class="text-end">
                    <span class="badge bg-primary fs-6 px-3 py-2" 
                          th:text="${patients != null ? patients.size() : 0} + ' bệnh nhân'">0 bệnh nhân</span>
                </div>
            </div>

            <div class="pt-card p-4">
                <div th:if="${#lists.isEmpty(patients)}" class="text-center py-5 text-muted">
                    <i class="bi bi-people display-4 d-block mb-3"></i>
                    <h5>Chưa có bệnh nhân nào</h5>
                    <p class="mb-0">Hệ thống hiện chưa có dữ liệu bệnh nhân.</p>
                </div>

                <div th:if="${!#lists.isEmpty(patients)}" class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Mã BN</th>
                                <th>Họ và tên</th>
                                <th>Giới tính</th>
                                <th>Ngày sinh</th>
                                <th>SĐT</th>
                                <th>Địa chỉ</th>
                                <th class="text-end">Hành động</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${patients}">
                                <td><span class="fw-bold text-primary" th:text="'BN-' + ${p.patientId}"></span></td>
                                <td th:text="${p.user != null ? p.user.fullName : p.fullName}"></td>
                                <td th:text="${p.gender}"></td>
                                <td th:text="${p.dateOfBirth != null ? #temporals.format(p.dateOfBirth, 'dd/MM/yyyy') : '—'}"></td>
                                <td th:text="${p.phone}"></td>
                                <td th:text="${p.address}"></td>
                                <td class="text-end">
                                    <a th:href="@{'/doctor/patients/' + ${p.patientId}}" 
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i> Xem hồ sơ
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
