<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Danh sách bệnh nhân - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        }

        .ms-table th,
        .ms-table td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 12px 16px;
            vertical-align: middle;
        }

        .text-wrap-vietnamese {
            white-space: normal !important;
            word-break: break-word;
            min-width: 180px;
            max-width: 260px;
        }

        .search-input-group {
            position: relative;
        }

        .search-input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-input-group .form-control {
            padding-left: 40px;
            border-radius: 10px;
        }

        .filter-select {
            border-radius: 10px;
            cursor: pointer;
        }

        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .pagination .page-item .page-link {
            color: #64748b;
            padding: 6px 12px;
            border-radius: 6px;
            margin: 0 2px;
            font-weight: 600;
        }

        .pagination .page-item.active .page-link {
            background-color: #0d6efd;
            border-color: #0d6efd;
            color: #fff;
        }
    </style>
</head>

<body>

    <div th:replace="~{doctor/fragments/doctor-shell :: nav}"></div>

    <main class="container-fluid px-3 px-lg-4 py-4">
        <div class="row g-4">

            <div class="col-12 col-xl-2">
                <div th:replace="~{doctor/fragments/doctor-shell :: sidebar('patients')}"></div>
            </div>

            <div class="col-12 col-xl-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="fw-bold fs-3 mb-1">
                            <i class="bi bi-journal-medical text-primary me-2"></i>
                            Danh sách bệnh nhân
                        </h1>
                        <p class="text-secondary mb-0">Quản lý toàn bộ bệnh nhân trên hệ thống MediScan AI.</p>
                    </div>
                    <div class="text-end">
                        <span class="badge bg-primary fs-6 px-3 py-2" id="totalCountLabel"
                            th:text="${patients != null ? patients.size() : 0} + ' bệnh nhân'"></span>
                    </div>
                </div>

                <section class="card p-3 mb-4 shadow-sm border-light">
                    <div class="row g-3">
                        <div class="col-12 col-md-6 col-lg-6">
                            <div class="search-input-group">
                                <i class="bi bi-search fs-5"></i>
                                <input type="text" id="searchInput" class="form-control form-control-lg"
                                    placeholder="Tìm kiếm theo Tên, Mã số, Số điện thoại..."
                                    onkeyup="filterPatientsTable()">
                            </div>
                        </div>
                        <div class="col-6 col-md-3 col-lg-3">
                            <select id="genderFilter"
                                class="form-select form-select-lg filter-select text-secondary fw-semibold"
                                onchange="filterPatientsTable()">
                                <option value="">Tất cả giới tính</option>
                                <option value="male">Nam</option>
                                <option value="female">Nữ</option>
                            </select>
                        </div>
                        <div class="col-6 col-md-3 col-lg-3">
                            <select id="addressFilter"
                                class="form-select form-select-lg filter-select text-secondary fw-semibold"
                                onchange="filterPatientsTable()">
                                <option value="">Tất cả khu vực</option>
                            </select>
                        </div>
                    </div>
                </section>

                <div class="pt-card p-4 bg-white rounded-3 shadow-sm">
                    <div id="emptyState"
                        th:class="${#lists.isEmpty(patients)} ? 'text-center py-5 text-muted' : 'text-center py-5 text-muted d-none'">
                        <i class="bi bi-people display-4 d-block mb-3 opacity-50"></i>
                        <h5>Chưa có bệnh nhân nào thích hợp</h5>
                        <p class="mb-0">Hệ thống hiện chưa có hoặc không tìm thấy dữ liệu bệnh nhân trùng khớp.</p>
                    </div>

                    <div th:if="${!#lists.isEmpty(patients)}" class="table-responsive">
                        <table class="table table-hover align-middle ms-table" id="patientsTable">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 10%">Mã BN</th>
                                    <th style="width: 25%">Họ và tên</th>
                                    <th style="width: 12%">Giới tính</th>
                                    <th style="width: 15%">Ngày sinh</th>
                                    <th style="width: 15%">SĐT</th>
                                    <th style="width: 15%">Địa chỉ</th>
                                    <th style="width: 8%" class="text-end">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody">
                                <tr th:each="p : ${patients}">
                                    <td><span class="fw-bold text-primary" th:text="'BN-' + ${p.patientId}"></span></td>
                                    <td class="fw-bold text-dark"
                                        th:text="${p.user != null ? p.user.fullName : p.fullName}"></td>
                                    <td>
                                        <span th:switch="${p.gender}">
                                            <span th:case="'MALE'">Nam</span>
                                            <span th:case="'FEMALE'">Nữ</span>
                                            <span th:case="*">N/A</span>
                                        </span>
                                    </td>
                                    <td
                                        th:text="${p.dateOfBirth != null ? #temporals.format(p.dateOfBirth, 'dd/MM/yyyy') : '—'}">
                                    </td>
                                    <td th:text="${p.phone != null ? p.phone : '—'}"></td>
                                    <td>
                                        <div class="text-wrap-vietnamese text-secondary small"
                                            th:text="${p.address != null && p.address != '' ? p.address : 'Chưa cập nhật'}">
                                        </div>
                                    </td>
                                    <td class="text-end">
                                        <a th:href="@{'/doctor/patients/' + ${p.patientId}}"
                                            class="btn btn-sm btn-outline-primary fw-bold rounded-2">
                                            <i class="bi bi-eye"></i> Xem hồ sơ
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination-container p-3 bg-light border-top rounded-bottom-3" id="paginationWrapper"
                        th:if="${!#lists.isEmpty(patients)}">
                        <div class="small text-muted fw-semibold" id="paginationInfo">
                            Đang hiển thị từ <span id="startRange"></span> đến <span id="endRange"></span> của <span
                                id="totalRecords"></span> bệnh nhân
                        </div>
                        <nav aria-label="Page navigation">
                            <ul class="pagination pagination-sm mb-0" id="paginationContainer"></ul>
                        </nav>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const rowsPerPage = 7;
        let currentPage = 1;
        let filteredRows = [];

        document.addEventListener("DOMContentLoaded", function () {
            initTableEngine();
        });

        function initTableEngine() {
            const tableBody = document.getElementById("tableBody");
            if (!tableBody) return;

            // Lấy danh sách gốc của toàn bộ hàng
            filteredRows = Array.from(tableBody.querySelectorAll("tr"));

            // TỰ ĐỘNG LẤY CÁC TỈNH THÀNH ĐANG CÓ TRONG BẢNG ĐỂ ĐỔ VÀO FILTER
            generateAddressFilterOptions(filteredRows);

            setupPagination(filteredRows.length);
            renderPage(currentPage);
        }

        // Hàm bổ sung: Tự động trích xuất Tỉnh/Thành phố từ địa chỉ bệnh nhân
        function generateAddressFilterOptions(rows) {
            const addressFilter = document.getElementById("addressFilter");
            if (!addressFilter) return;

            const provinces = new Set();

            rows.forEach(row => {
                const cells = row.getElementsByTagName("td");
                if (cells.length >= 6) {
                    const addressText = cells[5].textContent.trim();
                    // Nếu địa chỉ hợp lệ và không phải trạng thái trống
                    if (addressText && addressText !== "Chưa cập nhật" && addressText !== "—") {
                        // Thường tỉnh/thành phố nằm ở cuối chuỗi địa chỉ (sau dấu phẩy cuối cùng)
                        const parts = addressText.split(',');
                        const lastPart = parts[parts.length - 1].trim();
                        if (lastPart) {
                            provinces.add(lastPart);
                        }
                    }
                }
            });

            // Thêm các option tỉnh thành tìm được vào thanh filter
            provinces.forEach(province => {
                const option = document.createElement("option");
                option.value = province;
                option.textContent = province;
                addressFilter.appendChild(option);
            });
        }

        function filterPatientsTable() {
            const searchVal = document.getElementById("searchInput").value.toLowerCase().trim();
            const genderVal = document.getElementById("genderFilter").value; // Nhận 'male' hoặc 'female'
            const addressVal = document.getElementById("addressFilter").value.toLowerCase().trim();

            const tableBody = document.getElementById("tableBody");
            if (!tableBody) return;
            const allRows = Array.from(tableBody.getElementsByTagName("tr"));

            filteredRows = allRows.filter(row => {
                const cells = row.getElementsByTagName("td");
                if (cells.length < 6) return false;

                const idText = cells[0].textContent.toLowerCase();
                const nameText = cells[1].textContent.toLowerCase();
                const uiGenderText = cells[2].textContent.trim(); // Chứa chữ "Nam" hoặc "Nữ" trên UI
                const phoneText = cells[4].textContent.toLowerCase();
                const addressText = cells[5].textContent.toLowerCase();

                // Khớp điều kiện Tìm kiếm tổng hợp
                const matchSearch = idText.includes(searchVal) || nameText.includes(searchVal) || phoneText.includes(searchVal);

                // Map text giao diện sang value DB để phục vụ so khớp bộ lọc chính xác
                let rowGenderDbValue = "";
                if (uiGenderText === "Nam") rowGenderDbValue = "male";
                if (uiGenderText === "Nữ") rowGenderDbValue = "female";
                const matchGender = (genderVal === "") || (rowGenderDbValue === genderVal);

                // Khớp điều kiện địa chỉ trực tiếp từ DB
                const matchAddress = (addressVal === "") || addressText.includes(addressVal);

                return matchSearch && matchGender && matchAddress;
            });

            const emptyState = document.getElementById("emptyState");
            const paginationWrapper = document.getElementById("paginationWrapper");
            const tableResponsive = document.querySelector(".table-responsive");

            if (filteredRows.length === 0) {
                if (emptyState) emptyState.classList.remove("d-none");
                if (tableResponsive) tableResponsive.classList.add("d-none");
                if (paginationWrapper) paginationWrapper.style.setProperty("display", "none", "important");
            } else {
                if (emptyState) emptyState.classList.add("d-none");
                if (tableResponsive) tableResponsive.classList.remove("d-none");
                if (paginationWrapper) paginationWrapper.style.setProperty("display", "flex", "important");
            }

            currentPage = 1;
            setupPagination(filteredRows.length);
            renderPage(currentPage);
        }

        function setupPagination(totalItems) {
            const pageCount = Math.ceil(totalItems / rowsPerPage);
            const container = document.getElementById("paginationContainer");
            if (!container) return;
            container.innerHTML = "";

            if (pageCount <= 1) {
                updatePaginationInfo(totalItems);
                return;
            }

            createPageButton(container, "«", () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderPage(currentPage);
                }
            }, currentPage === 1);

            for (let i = 1; i <= pageCount; i++) {
                createPageButton(container, i, () => {
                    currentPage = i;
                    renderPage(currentPage);
                }, false, i === currentPage);
            }

            createPageButton(container, "»", () => {
                if (currentPage < pageCount) {
                    currentPage++;
                    renderPage(currentPage);
                }
            }, currentPage === pageCount);

            updatePaginationInfo(totalItems);
        }

        function createPageButton(parentContainer, text, onClickAction, isDisabled = false, isActive = false) {
            const li = document.createElement("li");
            li.className = `page-item ${isActive ? 'active' : ''} ${isDisabled ? 'disabled' : ''}`;

            const a = document.createElement("a");
            a.className = "page-link";
            a.href = "javascript:void(0);";
            a.textContent = text;
            a.addEventListener("click", onClickAction);

            li.appendChild(a);
            parentContainer.appendChild(li);
        }

        function renderPage(page) {
            const tableBody = document.getElementById("tableBody");
            if (!tableBody) return;
            const allRows = Array.from(tableBody.querySelectorAll("tr"));

            allRows.forEach(row => row.style.display = "none");

            const start = (page - 1) * rowsPerPage;
            const end = Math.min(start + rowsPerPage, filteredRows.length);

            for (let i = start; i < end; i++) {
                if (filteredRows[i]) filteredRows[i].style.display = "";
            }

            updatePaginationInfo(filteredRows.length);

            const paginationItems = document.querySelectorAll("#paginationContainer .page-item");
            paginationItems.forEach(item => {
                if (parseInt(item.textContent) === page) {
                    item.classList.add("active");
                } else if (item.textContent !== "«" && item.textContent !== "»") {
                    item.classList.remove("active");
                }
            });
        }

        function updatePaginationInfo(totalItems) {
            const start = totalItems === 0 ? 0 : (currentPage - 1) * rowsPerPage + 1;
            const end = Math.min(currentPage * rowsPerPage, totalItems);

            if (document.getElementById("startRange")) document.getElementById("startRange").textContent = start;
            if (document.getElementById("endRange")) document.getElementById("endRange").textContent = end;
            if (document.getElementById("totalRecords")) document.getElementById("totalRecords").textContent = totalItems;

            const totalCountLabel = document.getElementById("totalCountLabel");
            if (totalCountLabel) {
                totalCountLabel.textContent = totalItems + " bệnh nhân";
            }
        }
    </script>
</body>

</html>
