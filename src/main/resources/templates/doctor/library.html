<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmed Library - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Diagnosis Center', 'Bác sĩ', 'ms-avatar-purple')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('doctor', 'Diagnosis Center', 'Bác sĩ', 'ms-avatar-purple', 'library')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4">
                    <div>
                        <span class="ms-pill ms-pill-soft mb-3">Confirmed cases</span>
                        <h1 class="ms-display display-6 mb-2">Thư viện tư liệu bác sĩ</h1>
                    </div>
                    <div class="ms-readonly-note"><div class="fw-bold" th:text="${recordsPage.totalElements}">0</div><div class="small text-muted">Ca đã xác nhận</div></div>
                </section>

                <section class="ms-card-solid rounded-5 p-4 p-lg-5 mb-4">
                    <form th:action="@{/doctor/library}" method="get" class="row g-3 align-items-end">
                        <div class="col-md-6">
                            <label class="ms-label" for="q">Tìm kiếm</label>
                            <input id="q" name="q" class="form-control ms-input" th:value="${q}" placeholder="Mã hồ sơ, bệnh nhân, chẩn đoán...">
                        </div>
                        <div class="col-md-4">
                            <label class="ms-label" for="bodyPart">Vùng chụp</label>
                            <select id="bodyPart" name="bodyPart" class="form-select ms-input">
                                <option value="">Tất cả</option>
                                <option th:each="part : ${bodyPartFilters}" th:value="${part}" th:selected="${part == bodyPart}" th:text="${part}">Cẳng tay</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn ms-btn ms-btn-primary text-white w-100">Lọc</button>
                        </div>
                    </form>
                </section>

                <section class="row g-3">
                    <div class="col-md-6" th:each="record : ${recordsPage.content}">
                        <article class="ms-card-solid rounded-4 p-4 h-100">
                            <div class="d-flex justify-content-between gap-3 mb-3">
                                <div>
                                    <div class="fw-bold" th:text="${record.recordCode}">XR</div>
                                    <div class="small text-muted" th:text="${record.patient.fullName + ' - ' + record.bodyPart}">Patient</div>
                                </div>
                                <span class="ms-badge ms-badge-soft" th:text="${record.aiConfidence != null ? record.aiConfidence + '%' : '0%'}">90%</span>
                            </div>
                            <img th:if="${record.fileName != null}" th:src="@{'/uploads/' + ${record.fileName}}" class="img-fluid rounded border mb-3" alt="Confirmed X-Ray" style="max-height: 260px; width: 100%; object-fit: contain;">
                            <div class="small text-muted mb-1">AI</div>
                            <p class="mb-3" th:text="${record.aiPrediction}">AI prediction</p>
                            <div class="small text-muted mb-1">Bác sĩ xác nhận</div>
                            <p class="mb-3" th:text="${record.doctorConclusion}">Doctor conclusion</p>
                            <div class="small text-muted mb-1">Khuyến nghị</div>
                            <p class="mb-3" th:text="${record.recommendation}">Recommendation</p>
                            <a th:href="@{/doctor/record/{id}(id=${record.recordId})}" class="btn ms-btn ms-btn-secondary text-dark w-100">Xem chi tiết</a>
                        </article>
                    </div>
                    <div th:if="${recordsPage.empty}" class="col-12">
                        <section class="ms-card-solid rounded-5 p-5 text-center text-muted">Chưa có ca nào được bác sĩ xác nhận trong thư viện.</section>
                    </div>
                </section>

                <nav th:if="${recordsPage.totalPages > 1}" class="mt-4">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${recordsPage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/doctor/library(q=${q}, bodyPart=${bodyPart}, page=${recordsPage.number - 1}, size=${recordsPage.size})}">Trước</a>
                        </li>
                        <li class="page-item" th:each="pageNum : ${#numbers.sequence(0, recordsPage.totalPages - 1)}" th:classappend="${pageNum == recordsPage.number} ? 'active'">
                            <a class="page-link" th:href="@{/doctor/library(q=${q}, bodyPart=${bodyPart}, page=${pageNum}, size=${recordsPage.size})}" th:text="${pageNum + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${recordsPage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/doctor/library(q=${q}, bodyPart=${bodyPart}, page=${recordsPage.number + 1}, size=${recordsPage.size})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
