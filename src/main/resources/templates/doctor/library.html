<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thư viện hồ sơ đã chẩn đoán - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
    
    <style>
        .library-card { 
            transition: all .2s; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
        }
        .library-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.15); 
        }
        .xray-thumb {
            width: 100%; height: 200px;
            object-fit: contain;
            background: #0e1524;
            border-radius: 12px;
            border: 1px solid #1e293b;
        }
        .ai-text-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div th:replace="~{doctor/fragments/doctor-shell :: nav}"></div>

<main class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">
        <div class="col-12 col-xl-2">
            <div th:replace="~{doctor/fragments/doctor-shell :: sidebar('library')}"></div>
        </div>

        <div class="col-12 col-xl-10">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                <div>
                    <h1 class="fw-bold mb-1 fs-3">
                        <i class="bi bi-collection-fill text-primary me-2"></i>
                        Thư viện hồ sơ đã chẩn đoán
                    </h1>
                    <p class="text-secondary mb-0">Các ca đã được bác sĩ xác nhận kết luận.</p>
                </div>
                <div class="pt-stat">
                    <span class="pt-stat-icon ok"><i class="bi bi-clipboard2-check-fill"></i></span>
                    <span>
                        <span class="pt-stat-number" th:text="${completedCount ?: 0}">0</span>
                        <span class="pt-stat-label d-block">ca đã hoàn thành</span>
                    </span>
                </div>
            </div>

            <!-- Filter -->
            <section class="pt-card p-4 mb-4">
                <form th:action="@{/doctor/library}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="ms-label" for="q">Tìm kiếm</label>
                        <input id="q" name="q" class="form-control" th:value="${q}" placeholder="Mã hồ sơ, tên bệnh nhân...">
                    </div>
                    <div class="col-md-4">
                        <label class="ms-label" for="bodyPart">Vùng chụp</label>
                        <select id="bodyPart" name="bodyPart" class="form-select">
                            <option value="">Tất cả vùng chụp</option>
                            <option th:each="part : ${bodyPartFilters}" 
                                    th:value="${part}" 
                                    th:selected="${part == bodyPart}" 
                                    th:text="${part}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-funnel me-1"></i>Lọc
                        </button>
                    </div>
                </form>
            </section>

            <!-- Records -->
            <section class="row g-3">
                <div class="col-12" th:if="${#lists.isEmpty(completedRecords)}">
                    <div class="pt-card p-5 text-center text-muted">
                        <i class="bi bi-folder2-open display-4 mb-3"></i>
                        <h5>Chưa có hồ sơ nào</h5>
                        <p>Bác sĩ chưa xác nhận ca nào hoặc chưa có dữ liệu phù hợp.</p>
                    </div>
                </div>

                <div class="col-md-6 col-lg-4" th:each="record : ${completedRecords}">
                    <article class="pt-card p-4 library-card">
                        <div class="d-flex justify-content-between mb-3">
                            <div>
                                <div class="fw-bold text-primary" th:text="${record.recordCode}"></div>
                                <div class="small text-muted" 
                                     th:text="${record.patient?.fullName} + ' — ' + ${record.bodyPart}"></div>
                            </div>
                            <span class="badge bg-success">Đã xác nhận</span>
                        </div>

                        <img th:if="${record.fileName}" th:src="@{'/uploads/' + ${record.fileName}}" 
                             class="xray-thumb mb-3" alt="X-ray"
                             onerror="this.style.display='none'">

                        <div class="mb-2">
                            <small class="text-muted">AI:</small>
                            <p class="small mb-1 ai-text-truncate" th:text="${record.aiPrediction}"></p>
                        </div>

                        <div class="mb-3">
                            <small class="text-muted">Kết luận BS:</small>
                            <p class="small mb-0 ai-text-truncate" th:text="${record.doctorConclusion ?: 'Chưa có'}"></p>
                        </div>

                        <a th:href="@{/doctor/records/{id}/review(id=${record.recordId})}" 
                           class="btn btn-outline-primary w-100">
                            <i class="bi bi-eye"></i> Xem chi tiết
                        </a>
                    </article>
                </div>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
