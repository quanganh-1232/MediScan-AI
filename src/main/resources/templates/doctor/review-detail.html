<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết duyệt hồ sơ - MediScan AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <style>
        .xray-container { background: #000; border-radius: 12px; position: relative; overflow: hidden; }
        .xray-image { max-width: 100%; height: auto; display: block; margin: 0 auto; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{common/fragments/app-header :: header('Review Detail', 'Bác sĩ', 'ms-avatar-purple')}"></div>

<div class="container-fluid py-4">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card shadow-sm border-0 xray-container">
                <div class="card-header bg-dark text-white border-0 py-3">
                    <h6 class="mb-0"><i class="bi bi-eye"></i> Hình ảnh X-quang gốc</h6>
                </div>
                <div class="card-body p-0">
                    <img th:src="@{'/uploads/' + ${record.fileName}}" class="xray-image" alt="X-ray">
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card shadow-sm border-0 rounded-4 mb-4">
                <div class="card shadow-sm border-0 rounded-4 mb-4">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-4">
                            <h5 class="fw-bold mb-0">Thông tin chi tiết bệnh nhân</h5>
                            <span class="badge bg-primary px-3" th:text="${record.recordCode}">XR-123</span>
                        </div>

                        <div class="row g-4">
                            <div class="col-md-12">
                                <small class="text-muted d-block text-uppercase">Họ và tên</small>
                                <h4 class="fw-bold text-primary mb-0" th:text="${record.patient != null ? record.patient.fullName : 'N/A'}"></h4>
                            </div>

                            <div class="col-6">
                                <small class="text-muted d-block text-uppercase">Giới tính</small>
                                <strong th:text="${profile != null ? profile.gender : 'N/A'}"></strong>
                            </div>

                            <div class="col-6">
                                <small class="text-muted d-block text-uppercase">Ngày sinh</small>
                                <strong th:text="${profile != null && profile.dateOfBirth != null ? #temporals.format(profile.dateOfBirth, 'dd/MM/yyyy') : 'N/A'}"></strong>
                            </div>

                            <div class="col-6">
                                <small class="text-muted d-block text-uppercase">Số điện thoại</small>
                                <span th:text="${profile != null ? profile.phone : 'N/A'}"></span>
                            </div>

                            <div class="col-12">
                                <small class="text-muted d-block text-uppercase">Địa chỉ liên lạc</small>
                                <p class="mb-0 small" th:text="${profile != null ? profile.address : 'Chưa có địa chỉ'}"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0 rounded-4 mb-4 border-start border-4 border-warning">
                <div class="card-body">
                    <h5 class="fw-bold text-warning mb-3">Dự đoán của AI</h5>
                    <div class="p-3 bg-light rounded-3">
                        <h4 class="text-danger mb-2" th:text="${record.aiPrediction}">Phát hiện dấu hiệu bất thường</h4>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-danger"
                                 th:style="'width: ' + ${record.aiConfidence} + '%'"></div>
                        </div>
                        <small class="text-muted mt-1 d-block">Độ tin cậy: <span th:text="${record.aiConfidence + '%'}"></span></small>
                    </div>
                </div>
            </div>

            <form th:action="@{'/doctor/records/' + ${record.recordId} + '/conclusion'}" method="POST">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Kết luận bác sĩ</h5>
                        <textarea name="conclusion" class="form-control border-0 bg-light rounded-3 mb-3"
                                  rows="6" placeholder="Nhập chẩn đoán chuyên môn..."></textarea>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary rounded-pill py-2">Hoàn tất & Ký số</button>
                            <a th:href="@{/doctor/records/pending}" class="btn btn-link text-muted">Quay lại danh sách</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
