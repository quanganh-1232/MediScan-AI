<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thông báo - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
    <style>
        .notif-card {
            background: var(--ms-surface, #fff);
            border: 1px solid var(--ms-border, #e5e7eb);
            border-radius: 14px;
            padding: 1rem 1.25rem;
            margin-bottom: .75rem;
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            transition: all .2s;
            cursor: pointer;
        }
        .notif-card:hover { box-shadow: 0 4px 16px rgba(37,99,235,.1); border-color: #bfdbfe; }
        .notif-card.unread { border-left: 4px solid #2563eb; background: #f0f7ff; }
        .notif-card.read { opacity: .75; }
        .notif-icon {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.1rem; flex-shrink: 0;
        }
        .notif-card.read .notif-icon { background: #e2e8f0; color: #64748b; }
        .notif-title { font-weight: 700; font-size: .95rem; margin-bottom: .2rem; }
        .notif-message { font-size: .85rem; color: #475569; }
        .notif-time { font-size: .75rem; color: #94a3b8; margin-top: .3rem; }
        .notif-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: #2563eb; flex-shrink: 0; margin-top: .4rem; }
        .empty-state { text-align: center; padding: 4rem 1rem; color: #94a3b8; }
        .empty-state i { font-size: 3.5rem; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div th:replace="~{patient/fragments/patient-shell :: nav('notifications')}"></div>

<main class="container py-4" style="max-width: 760px;">

    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h1 class="fw-bold mb-0" style="font-size:1.5rem;"><i class="bi bi-bell-fill text-primary me-2"></i>Thông báo</h1>
            <div class="text-muted small mt-1">
                <span th:text="${unreadCount}">0</span> thông báo chưa đọc
            </div>
        </div>
        <button th:if="${unreadCount != null and unreadCount > 0}"
                class="btn btn-outline-primary btn-sm" id="readAllBtn" onclick="markAllRead()">
            <i class="bi bi-check2-all me-1"></i>Đánh dấu tất cả đã đọc
        </button>
    </div>

    <!-- Filter tabs -->
    <div class="d-flex gap-2 mb-3">
        <button class="btn btn-sm" id="tabAll" onclick="filterNotifs('all')"
                style="background:#2563eb;color:#fff;border-radius:999px;padding:.3rem .9rem;font-size:.82rem;border:none;">
            Tat ca
        </button>
        <button class="btn btn-sm" id="tabUnread" onclick="filterNotifs('unread')"
                style="background:#f1f5f9;color:#475569;border-radius:999px;padding:.3rem .9rem;font-size:.82rem;border:none;">
            Chua doc <span th:if="${unreadCount > 0}" class="badge bg-primary ms-1" th:text="${unreadCount}"></span>
        </button>
    </div>

    <!-- CSRF token -->
    <span id="csrfToken"  th:attr="data-token=${_csrf.token}"  style="display:none"></span>
    <span id="csrfHeader" th:attr="data-header=${_csrf.headerName}" style="display:none"></span>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(notifications)}" class="empty-state">
        <i class="bi bi-bell-slash"></i>
        <div class="fw-semibold mb-1">Chưa có thông báo nào</div>
        <div class="small">Khi bác sĩ xác nhận kết quả chẩn đoán, thông báo sẽ xuất hiện ở đây.</div>
    </div>

    <!-- Notification list -->
    <div th:each="n : ${notifications}" th:id="'notif-' + ${n.notificationId}"
         th:classappend="${!n.read ? 'unread' : 'read'}"
         class="notif-card"
         th:attr="data-id=${n.notificationId}, data-url=${n.recordId != null ? '/patient/records/' + n.recordId : ''}">

        <div class="notif-icon">
            <i class="bi bi-clipboard2-pulse-fill"></i>
        </div>

        <div class="flex-grow-1 min-w-0">
            <div class="notif-title" th:text="${n.title}">Tiêu đề thông báo</div>
            <div class="notif-message" th:text="${n.message}">Nội dung thông báo</div>
            <div class="notif-time">
                <i class="bi bi-clock me-1"></i>
                <span th:text="${#temporals.format(n.createdAt, 'HH:mm - dd/MM/yyyy')}">00:00 - 01/01/2025</span>
            </div>
        </div>

        <div th:if="${!n.read}" class="notif-unread-dot"></div>
        <div th:if="${n.recordId != null}" class="align-self-center ms-2">
            <i class="bi bi-chevron-right text-muted"></i>
        </div>
    </div>

    <!-- Pagination -->
    <div th:if="${notifPage != null and notifPage.totalPages > 1}"
         class="d-flex justify-content-center gap-2 mt-4">
        <a th:if="${currentPage > 0}"
           th:href="@{/patient/notifications(page=${currentPage - 1})}"
           class="btn btn-sm ms-btn ms-btn-ghost border px-3">
            <i class="bi bi-chevron-left"></i>
        </a>
        <span th:each="i : ${#numbers.sequence(0, notifPage.totalPages - 1)}">
            <a th:href="@{/patient/notifications(page=${i})}"
               class="btn btn-sm border px-3"
               th:classappend="${i == currentPage} ? ' ms-btn ms-btn-primary text-white' : ' ms-btn ms-btn-ghost'"
               th:text="${i + 1}">1</a>
        </span>
        <a th:if="${currentPage < notifPage.totalPages - 1}"
           th:href="@{/patient/notifications(page=${currentPage + 1})}"
           class="btn btn-sm ms-btn ms-btn-ghost border px-3">
            <i class="bi bi-chevron-right"></i>
        </a>
    </div>

</main>

<div th:replace="~{patient/fragments/patient-shell :: chatbot}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const csrf = {
        token: document.getElementById('csrfToken')?.dataset.token,
        header: document.getElementById('csrfHeader')?.dataset.header
    };

    // Event delegation — attach click to all notif-cards via data attributes
    document.querySelectorAll('.notif-card').forEach(function(card) {
        card.addEventListener('click', function() {
            const id = card.dataset.id;
            const url = card.dataset.url;
            markRead(id, url || null);
        });
    });

    function markRead(id, redirectUrl) {
        const card = document.getElementById('notif-' + id);
        if (!card) return;
        if (card.classList.contains('unread')) {
            const headers = { 'Content-Type': 'application/json' };
            if (csrf.token && csrf.header) headers[csrf.header] = csrf.token;
            fetch('/patient/notifications/' + id + '/read', { method: 'POST', headers })
                .then(() => {
                    card.classList.remove('unread');
                    card.classList.add('read');
                    card.querySelector('.notif-unread-dot')?.remove();
                    // Update badge count
                    const badge = document.querySelector('.ms-notification-count');
                    if (badge) {
                        const n = parseInt(badge.textContent) - 1;
                        if (n <= 0) badge.style.display = 'none';
                        else badge.textContent = n;
                    }
                });
        }
        if (redirectUrl) setTimeout(() => window.location.href = redirectUrl, 300);
    }

    function markAllRead() {
        const headers = { 'Content-Type': 'application/json' };
        if (csrf.token && csrf.header) headers[csrf.header] = csrf.token;
        fetch('/patient/notifications/read-all', { method: 'POST', headers })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.querySelectorAll('.notif-card.unread').forEach(c => {
                        c.classList.remove('unread'); c.classList.add('read');
                        c.querySelector('.notif-unread-dot')?.remove();
                    });
                    document.getElementById('readAllBtn')?.remove();
                    const badge = document.querySelector('.ms-notification-count');
                    if (badge) badge.style.display = 'none';
                    document.querySelector('.text-muted.small').textContent = '0 thong bao chua doc';
                }
            });
    }

    function filterNotifs(tab) {
        const tabAll = document.getElementById('tabAll');
        const tabUnread = document.getElementById('tabUnread');
        const cards = document.querySelectorAll('.notif-card');
        if (tab === 'unread') {
            tabUnread.style.background = '#2563eb'; tabUnread.style.color = '#fff';
            tabAll.style.background = '#f1f5f9'; tabAll.style.color = '#475569';
            cards.forEach(c => c.style.display = c.classList.contains('unread') ? '' : 'none');
        } else {
            tabAll.style.background = '#2563eb'; tabAll.style.color = '#fff';
            tabUnread.style.background = '#f1f5f9'; tabUnread.style.color = '#475569';
            cards.forEach(c => c.style.display = '');
        }
    }
</script>
</body>
</html>
