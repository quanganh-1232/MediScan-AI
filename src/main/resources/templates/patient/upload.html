<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Upload - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Patient Portal', 'Bệnh nhân', 'ms-avatar-primary')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('patient', 'Patient Portal', 'Bệnh nhân', 'ms-avatar-primary', 'upload-form')}"></div></div>
            <div class="col-12 col-xl-9">
                
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                <section class="ms-page-hero mb-4"><div><span class="ms-pill ms-pill-success mb-3">Tải ảnh lên AI</span><h1 class="ms-display display-6 mb-2">Phân tích hình ảnh X-Ray</h1></div></section>
                <section class="ms-card-solid rounded-5 p-4 p-lg-5">
                    <form id="uploadForm" th:action="@{/patient/upload}" method="post" enctype="multipart/form-data" onsubmit="showLoading()">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-4">
                            <label class="ms-label" for="bodyPart">Vùng chụp (VD: Cánh tay, Xương sườn, v.v.)</label>
                            <input id="bodyPart" name="bodyPart" class="form-control ms-input" required placeholder="Nhập vùng cơ thể...">
                        </div>
                        <div class="mb-4">
                            <label class="ms-label" for="xrayImage">Tải lên ảnh X-Ray (.png, .jpg, .dcm)</label>
                            <input type="file" id="xrayImage" name="xrayImage" class="form-control ms-input" accept=".png, .jpg, .jpeg, .dcm" required onchange="previewImage(event)">
                            <div class="mt-3 text-center">
                                <img id="imagePreview" src="#" alt="Preview" style="max-height: 300px; display: none; border-radius: 8px; border: 1px solid #ddd; padding: 5px;"/>
                            </div>
                        </div>
                        <button type="submit" class="btn ms-btn ms-btn-primary text-white w-100">Gửi và Phân Tích</button>
                    </form>
                </section>
            </div>
        </div>
    </main>
</div>

<!-- Loading Overlay -->
<div id="loadingOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; flex-direction: column;">
    <div class="spinner-border text-success" style="width: 4rem; height: 4rem;" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <h3 class="text-white mt-4" style="font-weight: 600;">Đang phân tích hình ảnh AI...</h3>
    <p class="text-light">Vui lòng đợi trong giây lát</p>
</div>
