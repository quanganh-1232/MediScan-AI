<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Support - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Patient Portal', 'Bệnh nhân', 'ms-avatar-orange')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('patient', 'Patient Portal', 'Bệnh nhân', 'ms-avatar-orange', 'support')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4"><div><span class="ms-pill ms-pill-success mb-3">Patient support</span><h1 class="ms-display display-6 mb-2">Hỗ trợ hồ sơ</h1></div></section>
                <section class="ms-card-solid rounded-5 p-4 p-lg-5">
                    <p class="ms-subtle mb-4">Khu vực này hỗ trợ xem lại dữ liệu, cập nhật thông tin cá nhân và nhận thông báo.</p>
                    <div class="d-grid gap-2">
                        <a th:href="@{/profile/edit}" class="btn ms-btn ms-btn-primary text-white">Cập nhật thông tin</a>
                        <a th:href="@{/notifications}" class="btn ms-btn ms-btn-ghost text-dark border-secondary bg-white">Xem thông báo</a>
                        <a th:href="@{/change-password}" class="btn ms-btn ms-btn-ghost text-dark border-secondary bg-white">Đổi mật khẩu</a>
                    </div>
                </section>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
