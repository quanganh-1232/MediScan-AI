<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Results - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Patient Portal', 'Bệnh nhân', 'ms-avatar-orange')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('patient', 'Patient Portal', 'Bệnh nhân', 'ms-avatar-orange', 'results')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4"><div><span class="ms-pill ms-pill-success mb-3">Patient results</span><h1 class="ms-display display-6 mb-2">Kết quả gần nhất</h1></div></section>
                <section class="ms-card-solid rounded-5 p-4 p-lg-5">
                    <div th:if="${latestRecord != null}">
                        <div class="ms-result-preview mb-3">
                            <div class="ms-result-preview-mark">AI</div>
                            <div>
                                <div class="fw-bold" th:text="${latestRecord.recordCode}">XR-2026-0001</div>
                                <div class="small text-muted" th:text="${'Độ tin cậy AI ' + (latestRecord.aiConfidence != null ? latestRecord.aiConfidence : 0) + '%'}">Độ tin cậy AI 0%</div>
                            </div>
                        </div>
                        <div class="mb-4 text-center" th:if="${latestRecord.fileName != null}">
                            <img th:src="@{'/uploads/' + ${latestRecord.fileName}}" class="img-fluid rounded border" alt="Annotated X-Ray Image" style="max-height: 400px; width: auto;"/>
                        </div>
                        <div class="row g-3">
                            <div class="col-12">
                                <div class="card shadow-sm rounded-4 border-0">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-start mb-3">
                                            <div>
                                                <h2 class="h5 mb-1">Tóm tắt chẩn đoán AI</h2>
                                                <p class="text-muted mb-0">AI phân tích ban đầu dựa trên ảnh chụp và mô hình ANFIS.</p>
                                            </div>
                                            <div class="d-flex flex-column align-items-end gap-2">
                                                <span class="badge bg-success" style="font-size: 0.9rem;">Độ tin cậy: <span th:text="${latestRecord.aiConfidence != null ? latestRecord.aiConfidence : 0}">0</span>%</span>
                                                <span th:if="${latestRecord.riskLevel != null && latestRecord.riskLevel != ''}"
                                                      th:class="'badge ' + (${latestRecord.riskLevel == 'high' || latestRecord.riskLevel == 'very_high'} ? 'bg-danger' : (${latestRecord.riskLevel == 'moderate'} ? 'bg-warning text-dark' : 'bg-info'))"
                                                      style="font-size: 0.85rem;"
                                                      th:text="'Mức nguy cơ: ' + (${latestRecord.riskLevel == 'very_high' ? 'Rất cao' : (latestRecord.riskLevel == 'high' ? 'Cao' : (latestRecord.riskLevel == 'moderate' ? 'Trung bình' : (latestRecord.riskLevel == 'low' ? 'Thấp' : 'Rất thấp')))})">
                                                </span>
                                            </div>
                                        </div>
                                        <p class="mb-0 text-dark" style="white-space: pre-line;" th:utext="${latestRecord.aiPrediction != null ? latestRecord.aiPrediction : 'Chưa có kết luận AI.'}">Chờ kết quả</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="card shadow-sm rounded-4 border-0">
                                    <div class="card-body">
                                        <h2 class="h5 mb-2">Khuyến nghị tiếp theo</h2>
                                        <p class="mb-0 text-dark" style="white-space: pre-line;" th:utext="${latestRecord.recommendation != null ? latestRecord.recommendation : 'Chưa có khuyến nghị. Vui lòng chờ bác sĩ đánh giá thêm.'}">Chưa có khuyến nghị.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:if="${latestRecord == null}" class="text-muted">Chưa có kết quả nào.</div>
                </section>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
