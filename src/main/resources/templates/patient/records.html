<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Patient Records - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Patient Portal', 'Bệnh nhân', 'ms-avatar-orange')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('patient', 'Patient Portal', 'Bệnh nhân', 'ms-avatar-orange', 'records')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4"><div><span class="ms-pill ms-pill-success mb-3">Patient records</span><h1 class="ms-display display-6 mb-2">Hồ sơ chụp X-Quang</h1></div></section>
                
                <div th:if="${successMessage}" class="alert alert-success mt-3" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger mt-3" th:text="${errorMessage}"></div>

                <section class="ms-card-solid rounded-5 p-4 p-lg-5 mb-4">
                    <form th:action="@{/patient/records}" method="get" class="row g-3">
                        <div class="col-md-6">
                            <input type="text" name="keyword" class="form-control" placeholder="Tìm kiếm theo mã, kết luận..." th:value="${keyword}">
                        </div>
                        <div class="col-md-4">
                            <select name="bodyPart" class="form-select">
                                <option value="">Tất cả vùng chụp</option>
                                <option value="Cẳng tay" th:selected="${bodyPart == 'Cẳng tay'}">Cẳng tay</option>
                                <option value="Xương sườn" th:selected="${bodyPart == 'Xương sườn'}">Xương sườn</option>
                                <option value="Khác" th:selected="${bodyPart == 'Khác'}">Khác</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">Lọc</button>
                        </div>
                    </form>
                </section>

                <section class="ms-card-solid rounded-5 p-4 p-lg-5">
                    <div class="table-responsive">
                        <table class="ms-table">
                            <thead><tr><th>Mã hồ sơ</th><th>Ngày chụp</th><th>Vùng chụp</th><th>Kết luận / AI</th><th>Hành động</th></tr></thead>
                            <tbody>
                            <tr th:each="record : ${recordPage.content}">
                                <td><div class="fw-bold" th:text="${record.recordCode}">XR-2026-0001</div><div class="small text-muted" th:text="${record.doctor != null ? 'Bác sĩ: ' + record.doctor.fullName : 'Chưa phân bác sĩ'}">Chưa phân bác sĩ</div></td>
                                <td th:text="${#temporals.format(record.capturedAt, 'dd/MM/yyyy')}">21/05/2026</td>
                                <td th:text="${record.bodyPart}">Cẳng tay</td>
                                <td>
                                    <div th:if="${record.doctorConclusion != null}">
                                        <span class="badge bg-success">Bác sĩ</span> <span th:text="${record.doctorConclusion}">Kết luận</span>
                                    </div>
                                    <div th:if="${record.doctorConclusion == null && record.aiPrediction != null}">
                                        <span class="badge bg-primary">AI</span> <span th:text="${record.aiPrediction}">AI</span>
                                    </div>
                                    <div th:if="${record.doctorConclusion == null && record.aiPrediction == null}">
                                        <span class="text-muted">Chờ phân tích</span>
                                    </div>
                                </td>
                                <td>
                                    <form th:action="@{/patient/records/delete}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xóa hồ sơ này? Hành động này không thể hoàn tác.');">
                                        <input type="hidden" name="recordId" th:value="${record.recordId}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Xóa</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${recordPage.empty}"><td colspan="5" class="text-center py-4 text-muted">Không tìm thấy hồ sơ nào.</td></tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <nav th:if="${recordPage.totalPages > 1}" class="mt-4">
                        <ul class="pagination justify-content-center">
                            <li class="page-item" th:classappend="${recordPage.first ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/patient/records(page=${recordPage.number - 1}, size=${recordPage.size}, keyword=${keyword}, bodyPart=${bodyPart})}">Trước</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, recordPage.totalPages - 1)}" th:classappend="${recordPage.number == i ? 'active' : ''}">
                                <a class="page-link" th:href="@{/patient/records(page=${i}, size=${recordPage.size}, keyword=${keyword}, bodyPart=${bodyPart})}" th:text="${i + 1}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${recordPage.last ? 'disabled' : ''}">
                                <a class="page-link" th:href="@{/patient/records(page=${recordPage.number + 1}, size=${recordPage.size}, keyword=${keyword}, bodyPart=${bodyPart})}">Sau</a>
                            </li>
                        </ul>
                    </nav>
                </section>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
