<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef7f6;
        }

        .auth-card {
            max-width: 520px;
            border-radius: 16px;
            border: none;
        }

        .brand {
            color: #0d9488;
            font-weight: 700;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 d-flex justify-content-center">
            <div class="card auth-card shadow p-4 w-100">
                <div class="text-center mb-4">
                    <h3 class="brand">Tạo tài khoản bệnh nhân</h3>
                    <p class="text-muted small mb-0">Đăng ký để sử dụng MediScan AI</p>
                </div>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}">
                    Lỗi đăng ký
                </div>

                <form th:action="@{/register}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label for="fullName" class="form-label">Họ và tên</label>
                        <input type="text"
                               id="fullName"
                               name="fullName"
                               class="form-control"
                               placeholder="Nhập họ và tên"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email đăng nhập</label>
                        <input type="email"
                               id="email"
                               name="email"
                               class="form-control"
                               placeholder="Nhập email"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Số điện thoại</label>
                        <input type="text"
                               id="phone"
                               name="phone"
                               class="form-control"
                               placeholder="Nhập số điện thoại">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Mật khẩu</label>
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-control"
                               placeholder="Nhập mật khẩu"
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
                        <input type="password"
                               id="confirmPassword"
                               name="confirmPassword"
                               class="form-control"
                               placeholder="Nhập lại mật khẩu"
                               required>
                    </div>

                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="agree" required>
                        <label class="form-check-label" for="agree">
                            Tôi đồng ý với điều khoản sử dụng
                        </label>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-success">
                            Đăng ký
                        </button>
                    </div>
                </form>

                <div class="text-center small">
                    <a th:href="@{/login}">Đã có tài khoản? Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
