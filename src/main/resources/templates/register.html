<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - MediScan AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .register-card { border-radius: 15px; border: none; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg register-card p-4">
                <div class="text-center mb-4">
                    <h3 class="text-primary fw-bold">Tạo tài khoản Bệnh nhân</h3>
                    <p class="text-muted">Điền thông tin để tham gia hệ thống</p>
                </div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="reg-username" th:field="*{username}" placeholder="Tài khoản" required>
                        <label for="reg-username">Tên đăng nhập mới</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="reg-password" th:field="*{password}" placeholder="Mật khẩu" required>
                        <label for="reg-password">Tạo mật khẩu</label>
                    </div>

                    <button class="btn btn-success w-100 py-2 mb-3" type="submit">Đăng ký tài khoản</button>
                </form>

                <div class="text-center">
                    <a th:href="@{/login}" class="text-decoration-none text-secondary">Đã có tài khoản? Quay lại đăng nhập</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
