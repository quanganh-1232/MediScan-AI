<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bác sĩ trực - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{receptionist/fragments/receptionist-shell :: nav}"></div>

<main class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">

        <!-- ============ Sidebar ============ -->
        <div class="col-12 col-xl-2">
            <div th:replace="~{receptionist/fragments/receptionist-shell :: sidebar('doctors')}"></div>
        </div>

        <!-- ============ Main ============ -->
        <div class="col-12 col-xl-10">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                <div>
                    <h1 class="fw-bold mb-1 fs-3"><i class="bi bi-person-badge text-primary me-2"></i>Bác sĩ trực hôm nay</h1>
                    <p class="text-secondary mb-0">Danh sách bác sĩ đang hoạt động trong hệ thống.</p>
                </div>
                <span class="pt-status pt-status-done fs-6" th:text="${doctorsOnDuty.size() + ' bác sĩ'}">0 bác sĩ</span>
            </div>

            <section class="pt-card p-4">
                <div class="row g-3">
                    <div class="col-12 col-md-6" th:each="d : ${doctorsOnDuty}">
                        <div class="d-flex align-items-center gap-3 p-3 rounded-3" style="background:#f8fafd;">
                            <span class="ms-avatar ms-avatar-primary fs-5" style="width:3rem;height:3rem;" th:text="${#strings.substring(d.fullName, 0, 1).toUpperCase()}">A</span>
                            <span class="flex-grow-1 min-w-0">
                                <span class="d-block fw-semibold" th:text="${'BS. ' + d.fullName}">BS. Trần Minh Đức</span>
                                <span class="d-block small text-muted">Chấn thương chỉnh hình</span>
                            </span>
                            <span class="pt-status pt-status-done">Đang trực</span>
                        </div>
                    </div>
                    <div class="col-12" th:if="${doctorsOnDuty == null or #lists.isEmpty(doctorsOnDuty)}">
                        <div class="text-center text-muted py-5">
                            <i class="bi bi-person-x fs-1 d-block mb-2 opacity-50"></i>
                            Chưa có bác sĩ nào đang hoạt động.
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
