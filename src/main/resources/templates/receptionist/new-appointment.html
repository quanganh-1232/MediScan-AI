<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tạo lịch mới - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{receptionist/fragments/receptionist-shell :: nav}"></div>

<main class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">

        <!-- ============ Sidebar ============ -->
        <div class="col-12 col-xl-2">
            <div th:replace="~{receptionist/fragments/receptionist-shell :: sidebar('new-appointment')}"></div>
        </div>

        <!-- ============ Main ============ -->
        <div class="col-12 col-xl-10">
            <div class="mb-4">
                <h1 class="fw-bold mb-1 fs-3"><i class="bi bi-calendar2-plus text-primary me-2"></i>Tạo lịch mới</h1>
                <p class="text-secondary mb-0">Đăng ký nhanh cho khách vãng lai — không cần tài khoản đăng nhập.</p>
            </div>

            <div th:if="${success}" class="alert alert-success ms-auth-alert mb-3"><i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span></div>
            <div th:if="${error}" class="alert alert-danger ms-auth-alert mb-3"><i class="bi bi-x-circle-fill"></i><span th:text="${error}"></span></div>

            <section class="pt-card p-4" style="max-width: 40rem;">
                <div class="pt-card-title mb-3"><i class="bi bi-lightning-charge"></i> Đăng ký nhanh <span class="small text-muted fw-normal">(Khách vãng lai)</span></div>
                <form th:action="@{/receptionist/appointments/walk-in}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="ms-label">Họ và tên *</label>
                            <input type="text" name="fullName" class="form-control ms-input" placeholder="Nhập họ và tên" required>
                        </div>
                        <div class="col-6">
                            <label class="ms-label">Số điện thoại *</label>
                            <input type="tel" name="phone" class="form-control ms-input" placeholder="Nhập số điện thoại" required>
                        </div>
                        <div class="col-6">
                            <label class="ms-label">Triệu chứng chính</label>
                            <input type="text" name="symptom" class="form-control ms-input" placeholder="VD: Đau khớp gối">
                        </div>
                        <div class="col-6">
                            <label class="ms-label">Bác sĩ phụ trách</label>
                            <select name="doctorId" class="form-select ms-input">
                                <option value="">Chọn bác sĩ</option>
                                <option th:each="d : ${doctorsOnDuty}" th:value="${d.userId}" th:text="${'BS. ' + d.fullName}">BS. A</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="ms-label">Giờ khám</label>
                            <input type="time" name="scheduledTime" class="form-control ms-input" th:value="${#temporals.format(#temporals.createNow(), 'HH:mm')}">
                        </div>
                        <div class="col-12 d-grid mt-2">
                            <button type="submit" class="btn ms-btn ms-btn-primary text-white">
                                <i class="bi bi-person-plus me-1"></i> Đăng ký &amp; Tạo lịch
                            </button>
                        </div>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
