<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Metrics - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Admin Center', 'Quản trị viên', 'ms-avatar-primary')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('admin', 'Admin Center', 'Quản trị viên', 'ms-avatar-primary', 'metrics')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4">
                    <div>
                        <span class="ms-pill ms-pill-danger mb-3">Admin metrics</span>
                        <h1 class="ms-display display-6 mb-2">Chỉ số hệ thống</h1>
                        <p class="ms-subtle mb-0">Trang riêng cho metrics, không còn dùng anchor trong cùng một màn.</p>
                    </div>
                </section>
                <div class="row g-3 g-lg-4">
                    <div class="col-6 col-xl-3"><div class="ms-metric h-100"><div class="ms-metric-label">Người dùng hoạt động</div><div class="ms-metric-number" th:text="${activeUserCount}">0</div></div></div>
                    <div class="col-6 col-xl-3"><div class="ms-metric h-100"><div class="ms-metric-label">Ca chờ xử lý</div><div class="ms-metric-number" th:text="${queueCount}">0</div></div></div>
                    <div class="col-6 col-xl-3"><div class="ms-metric h-100"><div class="ms-metric-label">Ca chụp hôm nay</div><div class="ms-metric-number" th:text="${todayRecordCount}">0</div></div></div>
                    <div class="col-6 col-xl-3"><div class="ms-metric h-100"><div class="ms-metric-label">Tổng hồ sơ chụp</div><div class="ms-metric-number" th:text="${totalRecordCount}">0</div></div></div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
