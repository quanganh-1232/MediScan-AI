<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chỉ số hệ thống - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/admin-shell :: nav}"></div>

<main class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">

        <div class="col-12 col-xl-2">
            <div th:replace="~{admin/fragments/admin-shell :: sidebar('metrics')}"></div>
        </div>

        <div class="col-12 col-xl-10">
            <div class="mb-4">
                <h1 class="fw-bold mb-1 fs-3"><i class="bi bi-bar-chart text-primary me-2"></i>Chỉ số hệ thống</h1>
                <p class="text-secondary mb-0">Các số liệu tổng hợp theo thời gian thực từ database.</p>
            </div>

            <div class="row g-3">
                <div class="col-6 col-lg-3">
                    <div class="pt-stat">
                        <span class="pt-stat-icon"><i class="bi bi-people"></i></span>
                        <span>
                            <span class="pt-stat-label d-block">Người dùng hoạt động</span>
                            <span class="pt-stat-number" th:text="${activeUserCount}">0</span>
                            <span class="small text-muted"> tài khoản</span>
                        </span>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="pt-stat">
                        <span class="pt-stat-icon warn"><i class="bi bi-hourglass-split"></i></span>
                        <span>
                            <span class="pt-stat-label d-block">Ca chờ xử lý</span>
                            <span class="pt-stat-number" th:text="${queueCount}">0</span>
                            <span class="small text-muted"> ca bệnh</span>
                        </span>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="pt-stat">
                        <span class="pt-stat-icon ok"><i class="bi bi-camera"></i></span>
                        <span>
                            <span class="pt-stat-label d-block">Ca chụp hôm nay</span>
                            <span class="pt-stat-number" th:text="${todayRecordCount}">0</span>
                            <span class="small text-muted"> ca bệnh</span>
                        </span>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="pt-stat">
                        <span class="pt-stat-icon"><i class="bi bi-collection"></i></span>
                        <span>
                            <span class="pt-stat-label d-block">Tổng hồ sơ chụp</span>
                            <span class="pt-stat-number" th:text="${totalRecordCount}">0</span>
                            <span class="small text-muted"> hồ sơ</span>
                        </span>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="pt-stat">
                        <span class="pt-stat-icon"><i class="bi bi-person-check"></i></span>
                        <span>
                            <span class="pt-stat-label d-block">Tổng người dùng</span>
                            <span class="pt-stat-number" th:text="${totalUserCount}">0</span>
                            <span class="small text-muted"> tài khoản</span>
                        </span>
                    </div>
                </div>
                <div class="col-6 col-lg-3">
                    <div class="pt-stat">
                        <span class="pt-stat-icon danger"><i class="bi bi-person-lock"></i></span>
                        <span>
                            <span class="pt-stat-label d-block">Tài khoản bị khóa</span>
                            <span class="pt-stat-number" th:text="${lockedUserCount}">0</span>
                            <span class="small text-muted"> tài khoản</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
