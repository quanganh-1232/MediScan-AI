<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý bác sĩ - MediScan AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet"><link th:href="@{/css/portal.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{admin/fragments/admin-shell :: nav}"></div>
<main class="container-fluid px-3 px-lg-4 py-4"><div class="row g-4">
    <div class="col-12 col-xl-2"><div th:replace="~{admin/fragments/admin-shell :: sidebar('doctors')}"></div></div>
    <div class="col-12 col-xl-10">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div><h1 class="fw-bold fs-3 mb-1"><i class="bi bi-person-badge text-primary me-2"></i>Quản lý bác sĩ</h1>
                <p class="text-muted mb-0">Thêm, cập nhật và quản lý trạng thái hoạt động của bác sĩ.</p></div>
            <button class="btn ms-btn ms-btn-primary text-white" data-bs-toggle="modal" data-bs-target="#addDoctor"><i class="bi bi-plus-lg me-1"></i>Thêm bác sĩ</button>
        </div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div><div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <section class="ms-card p-3 p-lg-4">
            <div class="d-flex flex-wrap justify-content-between gap-3 mb-3">
                <form class="d-flex gap-2 flex-grow-1" method="get"><input class="form-control ms-input" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên, email, số điện thoại">
                    <button class="btn btn-outline-primary"><i class="bi bi-search"></i></button></form>
                <span class="badge text-bg-light align-self-center p-2" th:text="${activeCount + ' bác sĩ đang hoạt động'}">0 bác sĩ đang hoạt động</span>
            </div>
            <div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>Bác sĩ</th><th>Liên hệ</th><th>Trạng thái</th><th class="text-end">Thao tác</th></tr></thead><tbody>
            <tr th:each="doctor : ${doctors}"><td><div class="fw-semibold" th:text="${doctor.fullName}"></div><small class="text-muted" th:text="${'#' + doctor.userId}"></small></td>
                <td><div th:text="${doctor.email}"></div><small class="text-muted" th:text="${doctor.phone != null && !doctor.phone.isBlank() ? doctor.phone : 'Chưa có SĐT'}"></small></td>
                <td><span class="badge" th:classappend="${doctor.status == 'ACTIVE'} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${doctor.status == 'ACTIVE' ? 'Hoạt động' : 'Đã khóa'}"></span></td>
                <td class="text-end"><button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="${'#editDoctor' + doctor.userId}"><i class="bi bi-pencil"></i></button>
                    <form class="d-inline" th:action="@{/admin/doctors/{id}/status(id=${doctor.userId})}" method="post"><input type="hidden" name="status" th:value="${doctor.status == 'ACTIVE' ? 'LOCKED' : 'ACTIVE'}">
                        <button class="btn btn-sm" th:classappend="${doctor.status == 'ACTIVE'} ? ' btn-outline-danger' : ' btn-outline-success'" th:title="${doctor.status == 'ACTIVE' ? 'Ngừng hoạt động' : 'Kích hoạt'}"><i class="bi" th:classappend="${doctor.status == 'ACTIVE'} ? ' bi-lock' : ' bi-unlock'"></i></button></form></td></tr>
            <tr th:if="${#lists.isEmpty(doctors)}"><td colspan="4" class="text-center text-muted py-5">Không tìm thấy bác sĩ.</td></tr></tbody></table></div>
        </section>
    </div>
</div></main>

<div class="modal fade" id="addDoctor" tabindex="-1"><div class="modal-dialog"><form class="modal-content" th:action="@{/admin/doctors}" method="post">
    <div class="modal-header"><h5 class="modal-title">Thêm bác sĩ</h5><button class="btn-close" type="button" data-bs-dismiss="modal"></button></div>
    <div class="modal-body row g-3"><div class="col-12"><label class="form-label">Họ và tên *</label><input class="form-control" name="fullName" required></div>
        <div class="col-12"><label class="form-label">Email *</label><input class="form-control" name="email" type="email" required></div>
        <div class="col-12"><label class="form-label">Số điện thoại</label><input class="form-control" name="phone"></div>
        <div class="col-12"><label class="form-label">Mật khẩu tạm thời *</label><input class="form-control" name="password" type="password" minlength="6" required></div></div>
    <div class="modal-footer"><button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary">Thêm bác sĩ</button></div>
</form></div></div>
<div class="modal fade" th:each="doctor : ${doctors}" th:id="${'editDoctor' + doctor.userId}" tabindex="-1"><div class="modal-dialog"><form class="modal-content" th:action="@{/admin/doctors/{id}/update(id=${doctor.userId})}" method="post">
    <div class="modal-header"><h5 class="modal-title">Cập nhật bác sĩ</h5><button class="btn-close" type="button" data-bs-dismiss="modal"></button></div>
    <div class="modal-body row g-3"><div class="col-12"><label class="form-label">Họ và tên *</label><input class="form-control" name="fullName" th:value="${doctor.fullName}" required></div>
        <div class="col-12"><label class="form-label">Email *</label><input class="form-control" name="email" type="email" th:value="${doctor.email}" required></div>
        <div class="col-12"><label class="form-label">Số điện thoại</label><input class="form-control" name="phone" th:value="${doctor.phone}"></div></div>
    <div class="modal-footer"><button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary">Lưu thay đổi</button></div>
</form></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script></body></html>
