<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ chụp gần đây - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
    <link th:href="@{/css/portal.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{admin/fragments/admin-shell :: nav}"></div>

<main class="container-fluid px-3 px-lg-4 py-4">
    <div class="row g-4">

        <div class="col-12 col-xl-2">
            <div th:replace="~{admin/fragments/admin-shell :: sidebar('recent-records')}"></div>
        </div>

        <div class="col-12 col-xl-10">
            <div class="mb-4">
                <h1 class="fw-bold mb-1 fs-3"><i class="bi bi-images text-primary me-2"></i>Hồ sơ chụp gần đây</h1>
                <p class="text-secondary mb-0">Các ca chụp X-quang mới nhất được ghi nhận trong hệ thống.</p>
            </div>

            <section class="pt-card p-4">
                <div class="table-responsive">
                    <table class="pt-table">
                        <thead>
                        <tr>
                            <th>Mã hồ sơ</th>
                            <th>Bệnh nhân</th>
                            <th>Vùng chụp</th>
                            <th>Ngày tạo</th>
                            <th>Trạng thái</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="record : ${recentRecords}">
                            <td><span class="fw-bold text-primary" th:text="${record.recordCode}">XR-0001</span></td>
                            <td th:text="${record.patient != null ? record.patient.fullName : 'N/A'}">Patient</td>
                            <td th:text="${record.bodyPart}">Cẳng tay</td>
                            <td>
                                <span class="small text-muted"
                                      th:text="${record.createdAt != null ? #temporals.format(record.createdAt, 'HH:mm dd/MM/yyyy') : (record.capturedAt != null ? #temporals.format(record.capturedAt, 'dd/MM/yyyy') : '-')}">-</span>
                            </td>
                            <td>
                                <span th:switch="${record.status}">
                                    <span th:case="'DOCTOR_CONFIRMED'" class="pt-status pt-status-done">Đã kết luận</span>
                                    <span th:case="'DOCTOR_REJECTED'" class="pt-status pt-status-cancelled">Cần chụp lại</span>
                                    <span th:case="'PENDING_DOCTOR'" class="pt-status pt-status-confirmed">Chờ bác sĩ</span>
                                    <span th:case="'AI_ANALYZED'" class="pt-status pt-status-confirmed">AI đã phân tích</span>
                                    <span th:case="'PENDING_AI'" class="pt-status pt-status-pending">Chờ AI</span>
                                    <span th:case="'AI_FAILED'" class="pt-status pt-status-cancelled">AI lỗi</span>
                                    <span th:case="*" class="pt-status pt-status-pending" th:text="${record.status}">-</span>
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(recentRecords)}">
                            <td colspan="5" class="text-center text-muted py-4">Chưa có hồ sơ chụp.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
