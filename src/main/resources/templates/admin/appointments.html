<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Quản lý lịch hẹn - MediScan AI</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"><link th:href="@{/css/mediscan-ui.css}" rel="stylesheet"><link th:href="@{/css/portal.css}" rel="stylesheet"></head>
<body><div th:replace="~{admin/fragments/admin-shell :: nav}"></div><main class="container-fluid px-3 px-lg-4 py-4"><div class="row g-4"><div class="col-12 col-xl-2"><div th:replace="~{admin/fragments/admin-shell :: sidebar('appointments')}"></div></div><div class="col-12 col-xl-10">
<div class="mb-4"><h1 class="fw-bold fs-3 mb-1"><i class="bi bi-calendar-check text-primary me-2"></i>Quản lý lịch hẹn</h1><p class="text-muted mb-0">Xem toàn bộ lịch, chỉnh sửa, hủy lịch và theo dõi trạng thái.</p></div><div th:if="${success}" class="alert alert-success" th:text="${success}"></div><div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<section class="ms-card p-3 p-lg-4"><form class="row g-2 mb-3" method="get"><div class="col-md"><input class="form-control ms-input" name="keyword" th:value="${keyword}" placeholder="Mã lịch hoặc tên bệnh nhân"></div><div class="col-md-3"><select class="form-select ms-input" name="status"><option value="">Tất cả trạng thái</option><option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">Pending</option><option value="CONFIRMED" th:selected="${selectedStatus == 'CONFIRMED'}">Confirmed</option><option value="COMPLETED" th:selected="${selectedStatus == 'COMPLETED'}">Done</option><option value="CANCELLED" th:selected="${selectedStatus == 'CANCELLED'}">Cancel</option></select></div><div class="col-auto"><button class="btn btn-outline-primary"><i class="bi bi-funnel me-1"></i>Lọc</button></div></form>
<div class="d-flex flex-wrap gap-2 mb-3"><span class="badge rounded-pill text-bg-warning">Pending</span><span class="badge rounded-pill text-bg-primary">Confirmed</span><span class="badge rounded-pill text-bg-success">Done</span><span class="badge rounded-pill text-bg-secondary">Cancel</span></div>
<div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>Lịch hẹn</th><th>Bệnh nhân</th><th>Thời gian</th><th>Phụ trách</th><th>Trạng thái</th><th class="text-end">Thao tác</th></tr></thead><tbody>
<tr th:each="appointment : ${appointments}"><td><div class="fw-semibold" th:text="${appointment.appointmentCode}"></div><small class="text-muted" th:text="${appointment.bodyPart != null ? appointment.bodyPart : appointment.appointmentType}"></small></td><td th:text="${appointment.patient != null ? appointment.patient.fullName : 'N/A'}"></td><td><div th:text="${#temporals.format(appointment.scheduledTime, 'dd/MM/yyyy HH:mm')}"></div><small class="text-muted" th:text="${appointment.location != null && !appointment.location.isBlank() ? appointment.location : 'Chưa có địa điểm'}"></small></td><td><small class="d-block" th:text="${appointment.doctor != null ? 'BS: ' + appointment.doctor.fullName : 'Chưa có bác sĩ'}"></small><small class="d-block text-muted" th:text="${appointment.technician != null ? 'KTV: ' + appointment.technician.fullName : 'Chưa có KTV'}"></small></td>
<td><span class="badge" th:classappend="${appointment.status == 'PENDING' || appointment.status == 'SCHEDULED'} ? ' text-bg-warning' : (${appointment.status == 'COMPLETED'} ? ' text-bg-success' : (${appointment.status == 'CANCELLED' || appointment.status == 'MISSED'} ? ' text-bg-secondary' : ' text-bg-primary'))" th:text="${appointment.status == 'COMPLETED' ? 'Done' : ((appointment.status == 'CANCELLED' || appointment.status == 'MISSED') ? 'Cancel' : ((appointment.status == 'PENDING' || appointment.status == 'SCHEDULED') ? 'Pending' : 'Confirmed'))}"></span></td>
<td class="text-end"><button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="${'#editAppointment' + appointment.appointmentId}" th:disabled="${appointment.status == 'CANCELLED'}"><i class="bi bi-pencil"></i></button><form class="d-inline" th:if="${appointment.status != 'CANCELLED' && appointment.status != 'COMPLETED'}" th:action="@{/admin/appointments/{id}/cancel(id=${appointment.appointmentId})}" method="post" onsubmit="return confirm('Bạn chắc chắn muốn hủy lịch này?')"><button class="btn btn-sm btn-outline-danger"><i class="bi bi-x-circle"></i></button></form></td></tr>
<tr th:if="${#lists.isEmpty(appointments)}"><td colspan="6" class="text-center text-muted py-5">Không có lịch hẹn phù hợp.</td></tr></tbody></table></div></section></div></div></main>
<div class="modal fade" th:each="appointment : ${appointments}" th:id="${'editAppointment' + appointment.appointmentId}" tabindex="-1"><div class="modal-dialog modal-lg"><form class="modal-content" th:action="@{/admin/appointments/{id}/update(id=${appointment.appointmentId})}" method="post"><div class="modal-header"><h5 class="modal-title" th:text="${'Chỉnh sửa lịch ' + appointment.appointmentCode}"></h5><button class="btn-close" type="button" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="row g-3"><div class="col-md-6"><label class="form-label">Thời gian *</label><input class="form-control" type="datetime-local" name="scheduledTime" th:value="${#temporals.format(appointment.scheduledTime, 'yyyy-MM-dd''T''HH:mm')}" required></div><div class="col-md-6"><label class="form-label">Trạng thái</label><select class="form-select" name="status"><option th:each="item : ${statuses}" th:value="${item}" th:selected="${item == appointment.status || (item == 'PENDING' && appointment.status == 'SCHEDULED') || (item == 'CONFIRMED' && (appointment.status == 'CHECKED_IN' || appointment.status == 'TRIAGED' || appointment.status == 'IN_PROGRESS')) || (item == 'CANCELLED' && appointment.status == 'MISSED')}" th:text="${item == 'COMPLETED' ? 'Done' : (item == 'CANCELLED' ? 'Cancel' : #strings.capitalize(#strings.toLowerCase(item)))}"></option></select></div><div class="col-md-6"><label class="form-label">Bác sĩ</label><select class="form-select" name="doctorId"><option value="">Chưa phân công</option><option th:each="doctor : ${doctors}" th:if="${doctor.status == 'ACTIVE'}" th:value="${doctor.userId}" th:text="${doctor.fullName}" th:selected="${appointment.doctor != null && appointment.doctor.userId == doctor.userId}"></option></select></div><div class="col-md-6"><label class="form-label">Kỹ thuật viên</label><select class="form-select" name="technicianId"><option value="">Chưa phân công</option><option th:each="tech : ${technicians}" th:if="${tech.status == 'ACTIVE'}" th:value="${tech.userId}" th:text="${tech.fullName}" th:selected="${appointment.technician != null && appointment.technician.userId == tech.userId}"></option></select></div><div class="col-12"><label class="form-label">Địa điểm</label><input class="form-control" name="location" th:value="${appointment.location}"></div><div class="col-12"><label class="form-label">Ghi chú</label><textarea class="form-control" rows="3" name="note" th:text="${appointment.note}"></textarea></div></div></div><div class="modal-footer"><button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary">Lưu thay đổi</button></div></form></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script></body></html>
