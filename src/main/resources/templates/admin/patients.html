<!DOCTYPE html><html lang="vi" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Quản lý bệnh nhân - MediScan AI</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"><link th:href="@{/css/mediscan-ui.css}" rel="stylesheet"><link th:href="@{/css/portal.css}" rel="stylesheet"></head>
<body><div th:replace="~{admin/fragments/admin-shell :: nav}"></div><main class="container-fluid px-3 px-lg-4 py-4"><div class="row g-4"><div class="col-12 col-xl-2"><div th:replace="~{admin/fragments/admin-shell :: sidebar('patients')}"></div></div><div class="col-12 col-xl-10">
<div class="mb-4"><h1 class="fw-bold fs-3 mb-1"><i class="bi bi-person-vcard text-primary me-2"></i>Quản lý bệnh nhân</h1><p class="text-muted mb-0">Tra cứu, chỉnh sửa thông tin và khóa hồ sơ khi cần.</p></div>
<div th:if="${success}" class="alert alert-success" th:text="${success}"></div><div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
<section class="ms-card p-3 p-lg-4"><form class="d-flex gap-2 mb-3" method="get"><input class="form-control ms-input" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên, email, số điện thoại"><button class="btn btn-outline-primary"><i class="bi bi-search"></i><span class="d-none d-sm-inline ms-1">Tìm kiếm</span></button></form>
<div class="table-responsive"><table class="table align-middle mb-0"><thead><tr><th>Bệnh nhân</th><th>Liên hệ</th><th>Giới tính</th><th>Trạng thái hồ sơ</th><th class="text-end">Thao tác</th></tr></thead><tbody>
<tr th:each="patient : ${patients}"><td><div class="fw-semibold" th:text="${patient.fullName}"></div><small class="text-muted" th:text="${'#BN' + patient.patientId}"></small></td><td><div th:text="${patient.phone != null && !patient.phone.isBlank() ? patient.phone : 'Chưa có SĐT'}"></div><small class="text-muted" th:text="${patient.user != null ? patient.user.email : 'Chưa có tài khoản'}"></small></td><td th:text="${patient.gender == 'MALE' ? 'Nam' : (patient.gender == 'FEMALE' ? 'Nữ' : 'Khác')}"></td>
<td><span th:if="${patient.user == null}" class="badge text-bg-light">Không có tài khoản</span><span th:if="${patient.user != null}" class="badge" th:classappend="${patient.user.status == 'ACTIVE'} ? ' text-bg-success' : ' text-bg-secondary'" th:text="${patient.user.status == 'ACTIVE' ? 'Đang hoạt động' : 'Đã khóa'}"></span></td>
<td class="text-end"><button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:data-bs-target="${'#editPatient' + patient.patientId}"><i class="bi bi-pencil"></i></button><form th:if="${patient.user != null}" class="d-inline" th:action="@{/admin/patients/{id}/lock(id=${patient.patientId})}" method="post"><input type="hidden" name="locked" th:value="${patient.user.status == 'ACTIVE'}"><button class="btn btn-sm" th:classappend="${patient.user.status == 'ACTIVE'} ? ' btn-outline-danger' : ' btn-outline-success'" th:title="${patient.user.status == 'ACTIVE' ? 'Khóa hồ sơ' : 'Mở khóa hồ sơ'}"><i class="bi" th:classappend="${patient.user.status == 'ACTIVE'} ? ' bi-lock' : ' bi-unlock'"></i></button></form></td></tr>
<tr th:if="${#lists.isEmpty(patients)}"><td colspan="5" class="text-center text-muted py-5">Không tìm thấy bệnh nhân.</td></tr></tbody></table></div></section></div></div></main>
<div class="modal fade" th:each="patient : ${patients}" th:id="${'editPatient' + patient.patientId}" tabindex="-1"><div class="modal-dialog modal-lg"><form class="modal-content" th:action="@{/admin/patients/{id}/update(id=${patient.patientId})}" method="post"><div class="modal-header"><h5 class="modal-title">Chỉnh sửa hồ sơ bệnh nhân</h5><button class="btn-close" type="button" data-bs-dismiss="modal"></button></div><div class="modal-body"><div class="row g-3"><div class="col-md-6"><label class="form-label">Họ tên *</label><input class="form-control" name="fullName" th:value="${patient.fullName}" required></div><div class="col-md-6"><label class="form-label">Số điện thoại</label><input class="form-control" name="phone" th:value="${patient.phone}"></div><div class="col-md-6"><label class="form-label">Giới tính</label><select class="form-select" name="gender"><option value="MALE" th:selected="${patient.gender == 'MALE'}">Nam</option><option value="FEMALE" th:selected="${patient.gender == 'FEMALE'}">Nữ</option><option value="OTHER" th:selected="${patient.gender == 'OTHER'}">Khác</option></select></div><div class="col-md-6"><label class="form-label">Địa chỉ</label><input class="form-control" name="address" th:value="${patient.address}"></div><div class="col-12"><label class="form-label">Tiền sử bệnh</label><textarea class="form-control" rows="4" name="medicalHistory" th:text="${patient.medicalHistory}"></textarea></div></div></div><div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button><button class="btn btn-primary">Lưu thay đổi</button></div></form></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script></body></html>
