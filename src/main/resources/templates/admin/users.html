<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Users - MediScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/mediscan-ui.css}" rel="stylesheet">
</head>
<body>
<div class="ms-shell">
    <div th:replace="~{common/fragments/app-header :: header('Admin Center', 'Quản trị viên', 'ms-avatar-primary')}"></div>
    <main class="container-fluid px-3 px-lg-4 py-4 py-lg-5">
        <div class="row g-4 align-items-start">
            <div class="col-12 col-xl-3"><div th:replace="~{common/fragments/app-sidebar :: sidebar('admin', 'Admin Center', 'Quản trị viên', 'ms-avatar-primary', 'users')}"></div></div>
            <div class="col-12 col-xl-9">
                <section class="ms-page-hero mb-4">
                    <div>
                        <span class="ms-pill ms-pill-danger mb-3">Admin users</span>
                        <h1 class="ms-display display-6 mb-2">Quản lý tài khoản</h1>
                    </div>
                </section>
                <section class="ms-card-solid rounded-5 p-4 p-lg-5">
                    <div class="table-responsive">
                        <table class="ms-table">
                            <thead><tr><th>Người dùng</th><th>Email</th><th>Vai trò</th></tr></thead>
                            <tbody>
                            <tr th:each="u : ${users}">
                                <td><div class="fw-bold" th:text="${u.fullName}">User</div><div class="small text-muted" th:text="${u.phone != null ? u.phone : 'Chưa cập nhật SĐT'}"></div></td>
                                <td th:text="${u.email}">email</td>
                    <td><span class="ms-badge ms-badge-soft" th:text="${u.role.displayName}">Bệnh nhân</span></td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(users)}"><td colspan="3" class="text-center text-muted py-4">Chưa có user nào.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </div>
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
