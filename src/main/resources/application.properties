spring.application.name=mediscan-auth

spring.datasource.url=jdbc:mysql://localhost:4406/ort_db?useSSL=false&allowPublicKeyRetrieval=true&connectionTimeZone=LOCAL
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}

spring.thymeleaf.cache=false

# Google OAuth2 Login
# Set these environment variables before running the app:
# GOOGLE_CLIENT_ID=your-google-client-id
# GOOGLE_CLIENT_SECRET=your-google-client-secret
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Demo accounts for local development.
# Default password for admin/doctor/technician/patient demo users: 123456
app.seed.demo-users=true

constant.key.signer-key=${SIGNER_KEY:dev-signer-key-change-me}

# ai-service (Python FastAPI) connection. The API key must match
# ai-service's AI_SERVICE_API_KEY env var so /predict rejects direct,
# unauthenticated callers.
ai.service.url=${AI_SERVICE_URL:http://localhost:8000/predict}
ai.service.api-key=${AI_SERVICE_API_KEY:dev-ai-key-change-me}

# Hiển thị lỗi chi tiết
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-exception=true

# Bật log debug
logging.level.org.springframework.web=DEBUG
logging.level.com.example.mediscanauth=DEBUG

spring.mvc.favicon.enabled=false

server.error.include-stacktrace=always
server.error.include-message=always
logging.level.org.springframework=DEBUG
logging.level.com.example.mediscanauth=DEBUG
