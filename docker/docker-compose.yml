services:
  mysql:
    image: mysql:8.0
    container_name: orthoai_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ort_db
      MYSQL_USER: ort
      MYSQL_PASSWORD: 1234
    ports:
      - "4406:3306"
    volumes:
      - orthoai_mysql_data:/var/lib/mysql

volumes:
  orthoai_mysql_data: